<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oxidocs</title>
<style>
:root {
  --accent: #185ABD;
  --accent-h: #1048A0;
  --accent-l: #E6EEF9;
  --rib: #F3F3F3;
  --rib-b: #D6D6D6;
  --txt: #333;
  --bg: #E8E8E8;
  --shad: 0 1px 4px rgba(0,0,0,.18);
  --hover: #E0E0E0;
  --grp: #D0D0D0;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);display:flex;flex-direction:column}

/* Title bar */
.tb{display:flex;align-items:center;height:32px;background:var(--accent);color:#fff;padding:0 12px;font-size:12px;user-select:none;flex-shrink:0}
.tb .logo{font-weight:700;margin-right:10px;letter-spacing:.5px}
.tb .qat{display:flex;gap:2px;margin-right:14px}
.tb .qat button svg,.tb .ra button svg{width:16px;height:16px;vertical-align:middle}
.tb .qat button,.tb .ra button{background:none;border:none;color:rgba(255,255,255,.9);cursor:pointer;padding:3px 7px;border-radius:3px;font-size:13px}
.tb .qat button:hover,.tb .ra button:hover{background:rgba(255,255,255,.18)}
.tb .dn{flex:1;text-align:center;opacity:.95}
.tb .ra{display:flex;gap:4px}
/* Mode toggle */
.mode-toggle{display:flex;background:rgba(255,255,255,.15);border-radius:12px;overflow:hidden;margin:0 8px}
.mode-toggle button{background:none;border:none;color:rgba(255,255,255,.7);font:inherit;font-size:11px;padding:3px 12px;cursor:pointer}
.mode-toggle button.active{background:rgba(255,255,255,.25);color:#fff;font-weight:600}

/* Ribbon tabs (desktop only) */
.rtabs{display:flex;align-items:flex-end;background:var(--accent);padding:0 8px;flex-shrink:0;height:26px}
.rtabs button{background:none;border:none;color:#fff;font:inherit;font-size:13px;padding:5px 14px;cursor:pointer;border-radius:4px 4px 0 0}
.rtabs button:hover{color:#fff;background:rgba(255,255,255,.1)}
.rtabs button.active{background:var(--rib);color:var(--txt);font-weight:500}

/* Ribbon panel (desktop only) */
.rib{background:var(--rib);border-bottom:1px solid var(--rib-b);padding:4px 10px 5px;display:flex;gap:2px;align-items:stretch;flex-shrink:0;min-height:82px}
.rg{display:flex;flex-direction:column;border-right:1px solid var(--grp);padding:0 8px}
.rg:last-child{border-right:none}
.rg-l{font-size:9px;color:#888;text-align:center;margin-top:auto;padding-top:2px;user-select:none}
.rr{display:flex;gap:1px;align-items:center}
.rc{display:flex;flex-direction:column;gap:1px}

/* Buttons */
.rb{background:none;border:1px solid transparent;cursor:pointer;padding:3px 5px;border-radius:3px;color:var(--txt);display:inline-flex;align-items:center;justify-content:center;min-width:24px;min-height:24px;font:inherit;font-size:13px;line-height:1}
.rb:hover{background:var(--hover);border-color:#C0C0C0}
.rb.active{background:#D0D8E8;border-color:#9DB2D6}
.rb svg{width:16px;height:16px;pointer-events:none}
.rb.lg{padding:4px 10px;font-size:12px;gap:4px}
.font-sel,.size-sel{font:inherit;font-size:12px;padding:1px 4px;border:1px solid #C0C0C0;border-radius:2px;height:24px;background:#fff;cursor:pointer;color:#333}
.font-sel{width:130px}
.size-sel{width:46px;text-align:center}
/* Color */
.cb{position:relative;display:inline-flex;flex-direction:column;align-items:center;background:none;border:1px solid transparent;cursor:pointer;padding:2px 5px;border-radius:3px;font-size:14px;min-width:28px;min-height:24px;font-weight:700;color:var(--txt)}
.cb:hover{background:var(--hover);border-color:#C0C0C0}
.cb .bar{height:3px;width:16px;border-radius:1px}
.cpop{display:none;position:absolute;top:100%;left:0;z-index:200;background:#fff;border:1px solid #ccc;border-radius:4px;padding:8px;box-shadow:0 4px 12px rgba(0,0,0,.2);gap:2px;flex-wrap:wrap;width:160px}
.cpop.show{display:flex}
.cpop .sw{width:16px;height:16px;border:1px solid #ddd;border-radius:2px;cursor:pointer;padding:0}
.cpop .sw:hover{border-color:#333;transform:scale(1.15)}
/* Table grid */
.tgp{display:none;position:absolute;top:100%;left:0;z-index:200;background:#fff;border:1px solid #ccc;border-radius:4px;padding:10px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.mbar .tgp{top:auto;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:8px}
.tgp.show{display:block}
.tgp .lbl{font-size:11px;color:#666;margin-bottom:6px;text-align:center}
.tg{display:grid;grid-template-columns:repeat(8,18px);gap:2px}
.tg .tc{width:18px;height:18px;border:1px solid #ccc;background:#fff;cursor:pointer;padding:0;border-radius:1px}
.tg .tc.hl{background:var(--accent-l);border-color:var(--accent)}

/* Document area */
.doc-area{flex:1;overflow-y:auto;overflow-x:auto;display:flex;flex-direction:column;align-items:center;padding:20px 0 60px}
.page{width:794px;min-height:1123px;background:#fff;box-shadow:var(--shad);margin-bottom:20px;padding:96px;position:relative}
.hf-area{padding:8px 0;font-family:'Calibri','Yu Gothic UI',sans-serif;font-size:9pt;color:#666;outline:none;min-height:1.5em;border-bottom:1px dashed #ccc;margin-bottom:8px;text-align:center}
.hf-area.hf-footer{border-bottom:none;border-top:1px dashed #ccc;margin-bottom:0;margin-top:8px}
.hf-area:empty::before{content:attr(data-placeholder);color:#bbb;pointer-events:none}
.hf-area:focus{background:rgba(0,100,200,.03)}
.page-content{outline:none;min-height:200px;font-family:'Calibri','Yu Gothic UI',sans-serif;font-size:10.5pt;line-height:1.15;color:#000;caret-color:#000}
.page-content:focus{outline:none}
.page-content p{margin-bottom:8pt}
.page-content h1{font-size:16pt;color:#1F3864;margin-bottom:6pt}
.page-content h2{font-size:13pt;color:#1F3864;margin-bottom:4pt}
.page-content table{border-collapse:collapse;width:100%;margin:8pt 0}
.page-content td,.page-content th{border:1px solid #999;padding:4px 6px;font-size:10.5pt;min-width:30px;vertical-align:top}
.page-content img{max-width:100%;height:auto}

/* Preview mode */
.preview-area{flex:1;overflow:auto;display:none;flex-direction:column;align-items:center;padding:20px 0 60px;background:#888}
.preview-area canvas{display:block;margin:10px auto;box-shadow:0 2px 8px rgba(0,0,0,.3);background:#fff}

/* Status bar */
.sb{display:flex;align-items:center;height:22px;background:var(--accent);color:#fff;padding:0 14px;font-size:11px;flex-shrink:0;gap:16px}
.sb .sep{opacity:.3}
.sb .zg{margin-left:auto;display:flex;align-items:center;gap:6px}
.sb input[type="range"]{width:90px;accent-color:#fff;height:4px}

/* ---- Mobile bottom bar ---- */
.mbar{display:none;flex-shrink:0;background:var(--rib);border-top:1px solid var(--rib-b);padding:4px 0 env(safe-area-inset-bottom,4px);overflow-x:auto;-webkit-overflow-scrolling:touch}
.mbar-row{display:flex;gap:2px;padding:0 8px;min-width:max-content;align-items:center}
.mbar .rb{min-width:36px;min-height:36px;font-size:15px}
.mbar .rb svg{width:20px;height:20px}
.mbar .sep{width:1px;height:28px;background:var(--grp);margin:0 4px;flex-shrink:0}

/* Ruler */
.ruler{height:18px;background:#fff;border-bottom:1px solid #D0D0D0;flex-shrink:0;display:flex;justify-content:center;align-items:flex-end}
.ruler-inner{width:794px;height:100%;position:relative;background:repeating-linear-gradient(90deg,transparent,transparent 95px,#ccc 95px,#ccc 96px)}

/* Dialog */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;z-index:100;align-items:center;justify-content:center}
.ov.show{display:flex}
.dlg{background:#fff;border-radius:8px;padding:28px 32px;min-width:320px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.dlg h2{font-size:16px;margin-bottom:12px;color:var(--accent)}
.dlg .acts{display:flex;gap:10px;margin-top:18px}
.dlg button{padding:7px 22px;border:none;border-radius:4px;cursor:pointer;font:inherit;font-size:13px;font-weight:500}
.dlg .bp{background:var(--accent);color:#fff}
.dlg .bp:hover{background:var(--accent-h)}
.dlg .bs{background:#E0E0E0;color:#333}
.dlg .bs:hover{background:#D0D0D0}
input[type="file"]{display:none}

/* Line spacing popup */
.ls-pop{position:fixed;inset:0;display:none;z-index:150;background:transparent;align-items:flex-end;justify-content:center}
.ls-pop.show{display:flex}
.ls-menu{background:#fff;border-radius:8px 8px 0 0;padding:12px 16px;box-shadow:0 -4px 16px rgba(0,0,0,.2);display:flex;flex-direction:column;gap:4px;min-width:180px;margin-bottom:env(safe-area-inset-bottom,0)}
.ls-menu button{padding:8px 16px;border:none;border-radius:4px;cursor:pointer;font:inherit;font-size:14px;background:#f5f5f5;text-align:left}
.ls-menu button:hover{background:var(--accent-l)}

/* ---- Responsive ---- */
@media(max-width:768px){
  .rtabs,.rib,.ruler{display:none!important}
  .mbar{display:block}
  .tb{height:44px;padding:0 8px}
  .tb .qat button,.tb .ra button{padding:6px 8px;font-size:14px}
  .tb .logo{font-size:14px}
  .sb{height:28px;font-size:12px}
  /* Reflow mode on mobile */
  .doc-area.reflow .page{width:100%!important;min-height:auto!important;box-shadow:none;margin:0;padding:16px!important;border-radius:0}
  .doc-area.reflow{padding:0}
  .mode-toggle{margin:0 4px}
}
@media(min-width:769px){
  .mbar{display:none!important}
}
</style>
</head>

function detectLang() {
  const stored = localStorage.getItem('oxi-lang');
  if (stored && I18N[stored]) return stored;
  const nav = navigator.language || 'en';
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('ko')) return 'ko';
  if (nav.startsWith('zh-TW') || nav.startsWith('zh-Hant')) return 'zh-Hant';
  if (nav.startsWith('zh')) return 'zh-Hans';
  if (nav.startsWith('de')) return 'de';
  if (nav.startsWith('fr')) return 'fr';
  if (nav.startsWith('es')) return 'es';
  if (nav.startsWith('it')) return 'it';
  if (nav.startsWith('pt')) return 'pt';
  return 'en';
}
let curLang = detectLang();
function t(key) { return (I18N[curLang] || I18N.en)[key] || I18N.en[key] || key; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    el.textContent = t(key);
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = t(el.dataset.i18nTitle);
  });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    el.placeholder = t(el.dataset.i18nPlaceholder);
  });
}

const exec = (cmd, v) => {
  // For foreColor with no selection, insert a zero-width space to anchor the color
  if (cmd === 'foreColor') {
    const sel = window.getSelection();
    if (sel.isCollapsed && sel.rangeCount) {
      const span = document.createElement('span');
      span.style.color = v;
      span.textContent = '\u200B'; // zero-width space
      const range = sel.getRangeAt(0);
      range.insertNode(span);
      range.setStart(span.firstChild, 1);
      range.collapse(true);
      sel.removeAllRanges(); sel.addRange(range);
      editor.focus(); updateToolbar();
      return;
    }
  }
  document.execCommand(cmd, false, v); editor.focus(); updateToolbar();
};

/** Render a single layout page to a canvas 2D context. */
function renderPageToCanvas(ctx, pg) {
  for (const el of pg.elements) {
    if (el.kind === 'text') {
      const fs = el.font_size || 11;
      const fam = el.font_family || 'sans-serif';
      ctx.font = `${el.italic?'italic ':''}${el.bold?'bold ':''}${fs}px ${fam}`;
      ctx.fillStyle = el.color || '#000';
      if (el.highlight && el.highlight !== 'none') {
        ctx.save(); ctx.fillStyle = el.highlight;
        ctx.fillRect(el.x, el.y, el.width, el.height);
        ctx.restore(); ctx.fillStyle = el.color || '#000';
      }
      ctx.fillText(el.text || '', el.x, el.y + fs * .85);
      if (el.underline) {
        ctx.beginPath(); ctx.strokeStyle = el.color || '#000'; ctx.lineWidth = fs * .05;
        ctx.moveTo(el.x, el.y + fs); ctx.lineTo(el.x + el.width, el.y + fs); ctx.stroke();
      }
    } else if (el.kind === 'border' && el.x1 != null) {
      ctx.beginPath(); ctx.strokeStyle = el.color || '#000'; ctx.lineWidth = el.width || .5;
      ctx.moveTo(el.x1, el.y1); ctx.lineTo(el.x2, el.y2); ctx.stroke();
    } else if (el.kind === 'shading' && el.color) {
      ctx.fillStyle = el.color; ctx.fillRect(el.x, el.y, el.width, el.height);
    } else if (el.kind === 'image' && el.image_data) {
      const img = new Image();
      const ct = el.content_type || 'image/png';
      img.src = `data:${ct};base64,${el.image_data}`;
      const ex = el.x, ey = el.y, ew = el.width, eh = el.height;
      img.onload = () => { ctx.drawImage(img, ex, ey, ew, eh); };
    }
  }
}

async function renderPreview() {
  previewArea.innerHTML = `<div style="color:#fff;padding:20px;font-size:14px">${t('rendering')}</div>`;
  try {
    const result = layout_document(currentDocx);
    previewArea.innerHTML = '';
    const isMobile = window.innerWidth < 769;
    const SCALE = isMobile ? window.innerWidth / (result.pages[0]?.width || 595) : 1.5;

    for (let i = 0; i < result.pages.length; i++) {
      const pg = result.pages[i];
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(pg.width * SCALE);
      canvas.height = Math.round(pg.height * SCALE);
      canvas.style.width = isMobile ? '100%' : canvas.width + 'px';
      canvas.style.height = isMobile ? 'auto' : canvas.height + 'px';
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.scale(SCALE, SCALE);
      renderPageToCanvas(ctx, pg);
      // Draw header/footer
      const hdr = getHeaderText();
      const ftr = getFooterText();
      if (hdr) {
        ctx.font = '9px Calibri, sans-serif';
        ctx.fillStyle = '#666';
        ctx.textAlign = 'center';
        ctx.fillText(hdr, pg.width / 2, 36);
        ctx.textAlign = 'start';
      }
      if (ftr) {
        ctx.font = '9px Calibri, sans-serif';
        ctx.fillStyle = '#666';
        ctx.textAlign = 'center';
        ctx.fillText(ftr, pg.width / 2, pg.height - 24);
        ctx.textAlign = 'start';
      }
      // Page number in footer
      if (ftr || hdr) {
        ctx.font = '8px Calibri, sans-serif';
        ctx.fillStyle = '#999';
        ctx.textAlign = 'center';
        ctx.fillText(`- ${i + 1} -`, pg.width / 2, pg.height - 12);
        ctx.textAlign = 'start';
      }
      ctx.restore();
      previewArea.appendChild(canvas);
    }
    $('pgInfo').textContent = `${result.pages.length} ${t('pages')}`;
  } catch(e) { previewArea.innerHTML = `<div style="color:#fff;padding:20px">${e.message}</div>`; }
}

// Image insert
function insImage() {
  const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
  inp.onchange = e => {
    const f = e.target.files[0]; if (!f) return;
    const rdr = new FileReader();
    rdr.onload = () => {
      const img = document.createElement('img');
      img.src = rdr.result;
      img.style.cssText = 'max-width:100%;height:auto;cursor:pointer;display:block;margin:8px 0';
      img.draggable = false;
      img.addEventListener('click', () => selectImage(img));
      const sel = window.getSelection();
      if (sel.rangeCount) {
        const range = sel.getRangeAt(0);
        range.insertNode(img);
        range.setStartAfter(img); sel.removeAllRanges(); sel.addRange(range);
      } else {
        editor.appendChild(img);
      }
    };
    rdr.readAsDataURL(f);
  };
  inp.click();
}

let activeImg = null;
function selectImage(img) {
  deselectImage();
  activeImg = img;
  img.style.outline = '2px solid var(--accent)';
  showImageMenu(img);
  // Add resize handles
  const wrapper = document.createElement('span');
  wrapper.className = 'img-wrap';
  wrapper.contentEditable = 'false';
  wrapper.style.cssText = 'display:inline-block;position:relative;line-height:0';
  img.parentNode.insertBefore(wrapper, img);
  wrapper.appendChild(img);
  const handle = document.createElement('div');
  handle.className = 'img-handle';
  handle.style.cssText = 'position:absolute;right:-4px;bottom:-4px;width:12px;height:12px;background:var(--accent);cursor:nwse-resize;border-radius:2px;border:1px solid #fff';
  wrapper.appendChild(handle);
  let startX, startW, startH;
  handle.addEventListener('pointerdown', e => {
    e.preventDefault(); e.stopPropagation();
    startX = e.clientX; startW = img.offsetWidth; startH = img.offsetHeight;
    const ratio = startH / startW;
    const onMove = ev => {
      const dx = ev.clientX - startX;
      const newW = Math.max(30, startW + dx);
      img.style.width = newW + 'px';
      img.style.height = Math.round(newW * ratio) + 'px';
    };
    const onUp = () => { document.removeEventListener('pointermove', onMove); document.removeEventListener('pointerup', onUp); };
    document.addEventListener('pointermove', onMove);
    document.addEventListener('pointerup', onUp);
  });
}
function deselectImage() {
  if (!activeImg) return;
  activeImg.style.outline = '';
  const wrap = activeImg.closest('.img-wrap');
  if (wrap) {
    wrap.parentNode.insertBefore(activeImg, wrap);
    wrap.remove();
  }
  activeImg = null;
  const menu = document.getElementById('imgMenu');
  if (menu) menu.style.display = 'none';
}

    menu.querySelector('#imgAlC').addEventListener('click', () => { if (activeImg) activeImg.style.cssText += ';margin-left:auto;margin-right:auto'; });
    menu.querySelector('#imgAlR').addEventListener('click', () => { if (activeImg) activeImg.style.cssText += ';margin-left:auto;margin-right:0'; });
    menu.querySelector('#imgSmall').addEventListener('click', () => { if (activeImg) { activeImg.style.width = '25%'; activeImg.style.height = 'auto'; } });
    menu.querySelector('#imgMed').addEventListener('click', () => { if (activeImg) { activeImg.style.width = '50%'; activeImg.style.height = 'auto'; } });
    menu.querySelector('#imgLarge').addEventListener('click', () => { if (activeImg) { activeImg.style.width = '100%'; activeImg.style.height = 'auto'; } });
    menu.querySelector('#imgCrop').addEventListener('click', () => {
      if (!activeImg) return;
      const img = activeImg;
      // Toggle crop mode: add a draggable crop overlay
      let cropOv = img.parentElement?.querySelector('.crop-ov');
      if (cropOv) { cropOv.remove(); return; }
      const wrap = img.closest('.img-wrap') || img.parentElement;
      cropOv = document.createElement('div');
      cropOv.className = 'crop-ov';
      cropOv.style.cssText = 'position:absolute;top:10%;left:10%;right:10%;bottom:10%;border:2px dashed #fff;background:rgba(0,0,0,.3);cursor:move;z-index:10';
      wrap.style.position = 'relative';
      wrap.appendChild(cropOv);
      // Drag to reposition crop area
      let ox, oy, ot, ol;
      cropOv.addEventListener('pointerdown', e => {
        e.preventDefault(); e.stopPropagation();
        ox = e.clientX; oy = e.clientY;
        ot = cropOv.offsetTop; ol = cropOv.offsetLeft;
        const onMove = ev => {
          cropOv.style.top = (ot + ev.clientY - oy) + 'px';
          cropOv.style.left = (ol + ev.clientX - ox) + 'px';
        };
        const onUp = () => { document.removeEventListener('pointermove', onMove); document.removeEventListener('pointerup', onUp); };
        document.addEventListener('pointermove', onMove);
        document.addEventListener('pointerup', onUp);
      });
      // Double-click to apply crop
      cropOv.addEventListener('dblclick', () => {
        const iw = img.naturalWidth, ih = img.naturalHeight;
        const dw = img.offsetWidth, dh = img.offsetHeight;
        const sx = iw / dw, sy = ih / dh;
        const cx = cropOv.offsetLeft * sx, cy = cropOv.offsetTop * sy;
        const cw = cropOv.offsetWidth * sx, ch = cropOv.offsetHeight * sy;
        // Draw cropped image to canvas
        const canvas = document.createElement('canvas');
        canvas.width = cw; canvas.height = ch;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, cx, cy, cw, ch, 0, 0, cw, ch);
        img.src = canvas.toDataURL('image/png');
        img.style.width = cropOv.offsetWidth + 'px';
        img.style.height = cropOv.offsetHeight + 'px';
        cropOv.remove();
      });
    });
    menu.querySelector('#imgDel').addEventListener('click', () => { if (activeImg) { const wrap = activeImg.closest('.img-wrap'); if (wrap) wrap.remove(); else activeImg.remove(); activeImg = null; menu.style.display = 'none'; } });
  }
  // Position menu above the image
  const wrap = img.closest('.img-wrap') || img;
  const rect = wrap.getBoundingClientRect();
  menu.style.display = 'flex';
  menu.style.left = rect.left + 'px';
  menu.style.top = (rect.top - 40 + window.scrollY) + 'px';
}

let mergeFields = [];

$('btnMailMerge').addEventListener('click', () => {
  const action = prompt('1: Insert field\n2: Load CSV data\n3: Generate merged docs', '1');
  if (action === '1') {
    const field = prompt(t('mergeField'), 'Name');
    if (!field) return;
    if (!mergeFields.includes(field)) mergeFields.push(field);
    const tag = document.createElement('span');
    tag.className = 'merge-field';

    tag.dataset.field = field;
    tag.style.cssText = 'display:inline-block;background:#E8F0FE;border:1px solid #4285F4;border-radius:3px;padding:1px 6px;font-size:9pt;color:#1A73E8;cursor:default;margin:0 2px';

    else editor.appendChild(tag);
  } else if (action === '2') {
    const csv = prompt(t('mergeData'), 'Name,Email\nJohn,john@example.com\nJane,jane@example.com');
    if (!csv) return;
    const lines = csv.trim().split('\n');
    const headers = lines[0].split(',').map(h => h.trim());
    mergeData = lines.slice(1).map(line => {
      const vals = line.split(',').map(v => v.trim());
      const obj = {};
      headers.forEach((h, i) => obj[h] = vals[i] || '');
      return obj;
    });
    alert(`Loaded ${mergeData.length} records with fields: ${headers.join(', ')}`);
  } else if (action === '3') {
    if (!mergeData.length) { alert('Load CSV data first (option 2)'); return; }
    // Generate merged documents
    syncDocx();
    const template = editor.innerHTML;
    for (let i = 0; i < mergeData.length; i++) {
      let html = template;
      const row = mergeData[i];
      for (const [key, val] of Object.entries(row)) {
        const re = new RegExp('«' + key + '»', 'g');
        html = html.replace(re, val);
      }
      // Build docx from merged content
      editor.innerHTML = html;
      syncDocx();
      dl(currentDocx, `${fileName}_${i + 1}.docx`, 'application/vnd.openxmlformats-officedocument.wordprocessingml.document');
    }
    editor.innerHTML = template; // Restore
    alert(`Generated ${mergeData.length} documents`);
  }
});

// ---- Undo/Redo stack ----
const undoStack = [];
const redoStack = [];
let undoTimer = null;
// ---- Unsaved changes warning ----
function isDirty() { return editor.innerHTML !== savedHtml; }
function markClean() { savedHtml = editor.innerHTML; }
window.addEventListener('beforeunload', e => {
  if (isDirty()) { e.preventDefault(); e.returnValue = ''; }
});
function saveUndoState() {
  const html = editor.innerHTML;
  if (undoStack.length && undoStack[undoStack.length-1] === html) return;
  undoStack.push(html);
  if (undoStack.length > 100) undoStack.shift();
  redoStack.length = 0;
}
function scheduleUndo() {
  if (undoTimer) clearTimeout(undoTimer);
  undoTimer = setTimeout(saveUndoState, 300);
}
function doUndo() {
  if (undoStack.length < 1) return;
  const current = editor.innerHTML;
  // If current differs from top of stack, push current first
  if (!undoStack.length || undoStack[undoStack.length-1] !== current) {
    undoStack.push(current);
  }
  const state = undoStack.length > 1 ? (undoStack.pop(), undoStack[undoStack.length-1]) : undoStack[0];
  redoStack.push(current);
  editor.innerHTML = state;
}
function doRedo() {
  if (!redoStack.length) return;
  const state = redoStack.pop();
  undoStack.push(editor.innerHTML);
  editor.innerHTML = state;
}
// Save initial state
saveUndoState();

$('btnUndo').addEventListener('click', doUndo);
$('btnRedo').addEventListener('click', doRedo);
editor.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
  if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); doRedo(); }
});

editor.addEventListener('input', () => { scheduleUndo(); updateStatus(); });
editor.addEventListener('keyup', updateToolbar);
editor.addEventListener('mouseup', updateToolbar);

  $('openOv').classList.remove('show');
  fileName = f.name.replace(/\.docx$/,'');
  $('docName').textContent = fileName;
  $('docName').removeAttribute('data-i18n');
  const r = new FileReader();
  r.onload = () => { currentDocx = new Uint8Array(r.result); loadDocx(currentDocx); };
  r.readAsArrayBuffer(f); e.target.value = '';
});

function loadDocx(data) {
  try {
    const doc = parse_document(data);
    editor.innerHTML = '';
    if (doc.pages) for (const pg of doc.pages) for (const b of pg.blocks) { const el = renderBlock(b); if (el) editor.appendChild(el); }
    if (!editor.innerHTML.trim()) editor.innerHTML = '<p><br></p>';

    // Store snapshot for diff-based saving
    originalDocx = new Uint8Array(data);
    originalSnapshot = takeSnapshot(doc);
    markClean();
    updateStatus();
  } catch(e) { alert('Failed: ' + e.message); }
}

/** Take a snapshot of the parsed document structure for later diffing. */
function takeSnapshot(doc) {
  const blocks = [];
  if (!doc.pages) return blocks;
  for (const pg of doc.pages) {
    for (const b of pg.blocks) {
      if (b.Paragraph) {
        const p = b.Paragraph;
        const text = (p.runs || []).map(r => r.text || '').join('');
        const runTexts = (p.runs || []).map(r => r.text || '');
        blocks.push({ type: 'paragraph', text, runTexts, heading: p.style?.heading_level || 0 });
      } else if (b.Table) {
        const tbl = b.Table;
        const cellTexts = (tbl.rows || []).map(row =>
          (row.cells || []).map(cell => {
            if (!cell.blocks) return '';
            return cell.blocks.map(cb => {
              if (cb.Paragraph) return (cb.Paragraph.runs || []).map(r => r.text || '').join('');
              return '';
            }).join('\n');
          })
        );
        blocks.push({ type: 'table', cellTexts });
      } else if (b.Image) {
        blocks.push({ type: 'image' });
      }
    }
  }
  return blocks;
}
function renderBlock(b) {
  if (b.Paragraph) return renderPara(b.Paragraph);
  if (b.Table) return renderTbl(b.Table);
  return null;
}
function renderPara(p) {
  const tag = p.style?.heading_level ? `h${p.style.heading_level}` : 'p';
  const el = document.createElement(tag);
  if (p.alignment) el.style.textAlign = p.alignment === 'Justify' ? 'justify' : p.alignment.toLowerCase();
  if (p.style?.indent_left) el.style.marginLeft = p.style.indent_left + 'pt';
  if (p.style?.indent_first_line) el.style.textIndent = p.style.indent_first_line + 'pt';
  if (p.style?.list_marker) { const m = document.createElement('span'); m.textContent = p.style.list_marker + ' '; el.appendChild(m); }
  if (p.runs?.length) for (const r of p.runs) el.appendChild(renderRun(r));
  else el.appendChild(document.createElement('br'));
  return el;
}
function renderRun(r) {
  const s = document.createElement('span'); s.textContent = r.text || '';
  const st = r.style || {};
  if (st.bold) s.style.fontWeight = 'bold';
  if (st.italic) s.style.fontStyle = 'italic';
  if (st.underline) s.style.textDecoration = 'underline';
  if (st.strikethrough) s.style.textDecoration = (s.style.textDecoration||'') + ' line-through';
  if (st.font_family) s.style.fontFamily = st.font_family;
  if (st.font_size) s.style.fontSize = st.font_size + 'pt';
  if (st.color) s.style.color = '#' + st.color;
  if (r.url) { const a = document.createElement('a'); a.href = r.url; a.target = '_blank'; a.appendChild(s); return a; }
  return s;
}
function renderTbl(t) {
  const tbl = document.createElement('table');
  for (const row of t.rows) {
    const tr = document.createElement('tr');
    for (const cell of row.cells) {
      const td = document.createElement('td');
      if (cell.shading) td.style.backgroundColor = '#' + cell.shading;
      if (cell.blocks) for (const b of cell.blocks) { const el = renderBlock(b); if (el) td.appendChild(el); }
      if (!td.childNodes.length) td.innerHTML = '<br>';
      tr.appendChild(td);
    }
    tbl.appendChild(tr);
  }
  return tbl;
}

// ---- DOM → Content structure → docx ----
function serializeEditor() {
  const blocks = [];
  for (const node of editor.childNodes) {
    const block = serializeNode(node);
    if (block) blocks.push(block);
  }
  if (!blocks.length) blocks.push({ type: 'paragraph', runs: [{ text: '' }] });
  return blocks;
}

function serializeNode(node) {
  if (node.nodeType === 3) {
    // Text node at top level — wrap in paragraph
    const text = node.textContent;
    if (!text.trim()) return null;
    return { type: 'paragraph', runs: [{ text }] };
  }
  if (node.nodeType !== 1) return null;
  const tag = node.tagName;

  if (tag === 'TABLE') return serializeTable(node);

  // Paragraph-like elements
  if (['P','H1','H2','H3','H4','H5','H6','DIV','LI'].includes(tag)) {
    const block = { type: 'paragraph', runs: [] };
    // Heading level
    const m = tag.match(/^H(\d)$/);
    if (m) block.heading_level = +m[1];
    // Alignment
    const align = node.style.textAlign;
    if (align && align !== 'start') block.alignment = align;
    // Line height
    const lh = parseFloat(node.style.lineHeight);
    if (lh && lh > 0) block.line_height = lh;
    // Collect runs
    collectRuns(node, block.runs, {});
    // Remove empty trailing runs
    if (!block.runs.length) block.runs.push({ text: '' });
    return block;
  }

  // Unknown block element — try to extract text
  if (node.children && node.children.length) {
    const results = [];
    for (const child of node.childNodes) {
      const b = serializeNode(child);
      if (b) results.push(b);
    }
    return results.length === 1 ? results[0] : null;
  }

  return null;
}

function collectRuns(node, runs, inherited) {
  for (const child of node.childNodes) {
    if (child.nodeType === 3) {
      const text = child.textContent;
      if (text) {
        runs.push({ text, ...inherited });
      }
      continue;
    }
    if (child.nodeType !== 1) continue;
    if (child.tagName === 'BR') {
      // Soft line break — append newline to current run text
      runs.push({ text: '\n', ...inherited });
      continue;
    }
    if (child.tagName === 'IMG') {
      // Skip images in run collection (handled separately)
      continue;
    }
    // Build style from this element
    const style = { ...inherited };
    const cs = child.style;
    const tag = child.tagName;
    if (tag === 'B' || tag === 'STRONG' || cs.fontWeight === 'bold' || +cs.fontWeight >= 700) style.bold = true;
    if (tag === 'I' || tag === 'EM' || cs.fontStyle === 'italic') style.italic = true;
    if (tag === 'U' || (cs.textDecoration && cs.textDecoration.includes('underline'))) style.underline = true;
    if (tag === 'S' || tag === 'STRIKE' || (cs.textDecoration && cs.textDecoration.includes('line-through'))) style.strikethrough = true;
    if (cs.fontFamily) {
      const ff = cs.fontFamily.replace(/['"]/g, '').split(',')[0].trim();
      if (ff) style.font_family = ff;
    }
    if (cs.fontSize) {
      const sz = parseFloat(cs.fontSize);
      if (sz > 0) {
        // Convert px to pt if needed (CSS default)
        if (cs.fontSize.endsWith('pt')) style.font_size = sz;
        else if (cs.fontSize.endsWith('px')) style.font_size = sz * 72 / 96;
        else style.font_size = sz;
      }
    }
    if (cs.color && cs.color !== 'rgb(0, 0, 0)') {
      style.color = rgbToHex(cs.color);
    }
    // FONT tag compatibility (execCommand generates these)
    if (tag === 'FONT') {
      if (child.color) style.color = child.color.replace('#','');
      if (child.face) style.font_family = child.face;
    }
    // Recurse
    collectRuns(child, runs, style);
  }
}

function rgbToHex(rgb) {
  if (!rgb) return undefined;
  if (rgb.startsWith('#')) return rgb.replace('#','');
  const m = rgb.match(/(\d+)/g);
  if (!m || m.length < 3) return undefined;
  return m.slice(0,3).map(n => (+n).toString(16).padStart(2,'0')).join('');
}

function serializeTable(tbl) {
  const rows = [];
  for (const tr of tbl.querySelectorAll(':scope > tr, :scope > thead > tr, :scope > tbody > tr')) {
    const cells = [];
    for (const td of tr.querySelectorAll(':scope > td, :scope > th')) {
      const text = td.innerText.replace(/\n$/,'');
      // Check for bold in cell
      const cs = getComputedStyle(td);
      const bold = cs.fontWeight === 'bold' || +cs.fontWeight >= 700 ||
        td.querySelector('b,strong') !== null || td.tagName === 'TH';
      cells.push({ text, bold: bold || undefined });
    }
    if (cells.length) rows.push(cells);
  }
  return { type: 'table', rows };
}

/**
 * 3-tier sync strategy:
 * Tier 1: Text-only changes → edit_docx_advanced (full OOXML preservation)
 * Tier 2: Structure changed → build_docx_with_template (preserve styles/theme)
 * Tier 3: New document → build_docx (from scratch)
 */
function syncDocx() {
  try {
    if (!originalDocx || !originalSnapshot) {
      // Tier 3: New document — build from scratch
      const content = serializeEditor();
      currentDocx = new Uint8Array(build_docx(content));
      return;
    }

    // Compare current DOM with original snapshot
    const currentBlocks = serializeEditorAsSnapshot();
    const diff = computeDiff(originalSnapshot, currentBlocks);

    if (diff.structureChanged) {
      // Tier 2: Structure changed — rebuild with template styles
      const content = serializeEditor();
      currentDocx = new Uint8Array(build_docx_with_template(content, originalDocx));
    } else if (diff.edits.length > 0) {
      // Tier 1: Text-only changes — patch original docx
      currentDocx = new Uint8Array(edit_docx_advanced(originalDocx, diff.edits));
    }
    // else: no changes, keep currentDocx as-is
  } catch(e) {
    console.error('syncDocx failed:', e);
    // Ultimate fallback: build from scratch
    try {
      const content = serializeEditor();
      currentDocx = new Uint8Array(build_docx(content));
    } catch(e2) { console.error('fallback failed:', e2); }
  }
}

/** Serialize current DOM into snapshot format for comparison. */
function serializeEditorAsSnapshot() {
  const blocks = [];
  for (const node of editor.childNodes) {
    if (node.nodeType !== 1) continue;
    const tag = node.tagName;
    if (tag === 'TABLE') {
      const cellTexts = [];
      for (const tr of node.querySelectorAll('tr')) {
        const row = [];
        for (const td of tr.querySelectorAll('td,th')) {
          row.push(td.innerText.replace(/\n$/, ''));
        }
        cellTexts.push(row);
      }
      blocks.push({ type: 'table', cellTexts });
    } else if (['P','H1','H2','H3','H4','H5','H6','DIV'].includes(tag)) {
      const text = node.innerText.replace(/\n$/, '');
      blocks.push({ type: 'paragraph', text });
    }
  }
  return blocks;
}

/** Compare original snapshot with current state, produce edit operations. */
function computeDiff(original, current) {
  const result = { structureChanged: false, edits: [] };

  // Check if block types match (paragraph/table at each position)
  if (original.length !== current.length) {
    result.structureChanged = true;
    return result;
  }

  let paraIdx = 0; // Paragraph index (body-level, excluding tables)
  let tableIdx = 0;

  for (let i = 0; i < original.length; i++) {
    const orig = original[i];
    const curr = current[i];

    if (orig.type !== curr.type) {
      result.structureChanged = true;
      return result;
    }

    if (orig.type === 'paragraph') {
      // Compare text content
      if (orig.text !== curr.text) {
        // Generate SetRunText — replace all runs with single run containing new text
        // This loses original run splits but preserves paragraph-level formatting
        result.edits.push({
          type: 'set_run_text',
          paragraph_index: paraIdx,
          run_index: 0,
          new_text: curr.text,
        });

        // If original had multiple runs, delete the extra ones
        if (orig.runTexts && orig.runTexts.length > 1) {
          for (let r = orig.runTexts.length - 1; r >= 1; r--) {
            result.edits.push({
              type: 'delete_run',
              paragraph_index: paraIdx,
              run_index: r,
            });
          }
        }
      }
      paraIdx++;
    } else if (orig.type === 'table') {
      // Compare cell texts
      const origCells = orig.cellTexts || [];
      const currCells = curr.cellTexts || [];
      if (origCells.length !== currCells.length) {
        result.structureChanged = true;
        return result;
      }
      for (let r = 0; r < origCells.length; r++) {
        if (origCells[r].length !== currCells[r].length) {
          result.structureChanged = true;
          return result;
        }
        for (let c = 0; c < origCells[r].length; c++) {
          if (origCells[r][c] !== currCells[r][c]) {
            result.edits.push({
              type: 'set_cell_text',
              table_index: tableIdx,
              row: r,
              col: c,
              text: currCells[r][c],
            });
          }
        }
      }
      tableIdx++;
    }
    // 'image' blocks: no text to diff
  }

  return result;
}

// ---- Save / Export ----
function dl(d, name, mime) { const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([d],{type:mime})); a.download = name; a.click(); URL.revokeObjectURL(a.href); }
$('btnSave').addEventListener('click', () => {
  syncDocx();
  dl(currentDocx, (fileName||'doc')+'.docx', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document');
  markClean();
});
$('btnPdf').addEventListener('click', () => {
  syncDocx();
  try { dl(docx_to_pdf(currentDocx), (fileName||'doc')+'.pdf', 'application/pdf'); }
  catch(e) { alert('PDF: ' + e.message); }
});

zs.addEventListener('input', e => setZ(+e.target.value));
$('zOut').addEventListener('click', () => setZ(+zs.value-10));
$('zIn').addEventListener('click', () => setZ(+zs.value+10));

$('pgLetter').addEventListener('click', () => { $('page1').style.width='816px'; $('page1').style.minHeight='1056px'; $('pgLetter').classList.add('active'); $('pgA4').classList.remove('active'); });
$('mgNorm').addEventListener('click', () => { $('page1').style.padding='96px'; $('mgNorm').classList.add('active'); $('mgNarrow').classList.remove('active'); });
$('mgNarrow').addEventListener('click', () => { $('page1').style.padding='48px'; $('mgNarrow').classList.add('active'); $('mgNorm').classList.remove('active'); });

// ---- Keyboard ----
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key==='s') { e.preventDefault(); $('btnSave').click(); }
    if (e.key==='o') { e.preventDefault(); $('btnOpen').click(); }
    if (e.key==='f') { e.preventDefault(); toggleFind(); }
    if (e.key==='h') { e.preventDefault(); toggleFind(); }
    if (e.key==='p') { e.preventDefault(); printDoc(); }
  }
  if (e.key === 'Escape') { $('findBar').style.display = 'none'; }
});

// ---- Find / Replace (#7) ----
function toggleFind() {
  const bar = $('findBar');
  bar.style.display = bar.style.display === 'none' ? 'block' : 'none';
  if (bar.style.display === 'block') $('findInput').focus();
}
function findInEditor(dir) {
  const query = $('findInput').value;
  if (!query) return;
  // Use window.find for simplicity (works in most browsers)
  const found = window.find(query, false, dir === 'prev', true, false, true, false);
  // Count occurrences
  const text = editor.innerText;
  const regex = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  const matches = text.match(regex);
  $('findCount').textContent = matches ? matches.length + ' found' : 'Not found';
}
$('findNext').addEventListener('click', () => findInEditor('next'));
$('findPrev').addEventListener('click', () => findInEditor('prev'));
$('findInput').addEventListener('keydown', e => { if (e.key === 'Enter') findInEditor(e.shiftKey ? 'prev' : 'next'); });
$('findClose').addEventListener('click', () => { $('findBar').style.display = 'none'; });
$('replaceOne').addEventListener('click', () => {
  const sel = window.getSelection();
  if (sel.rangeCount && !sel.isCollapsed) {
    const range = sel.getRangeAt(0);
    range.deleteContents();
    range.insertNode(document.createTextNode($('replaceInput').value));
  }
  findInEditor('next');
});
$('replaceAll').addEventListener('click', () => {
  const find = $('findInput').value;
  const repl = $('replaceInput').value;
  if (!find) return;
  // Walk text nodes
  const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, null);
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  let count = 0;
  for (const node of nodes) {
    if (node.textContent.includes(find)) {
      node.textContent = node.textContent.split(find).join(repl);
      count++;
    }
  }
  $('findCount').textContent = count ? count + ' replaced' : 'Not found';
});

// ---- Print (#9) ----
function printDoc() {
  // Create a print-friendly iframe
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'position:fixed;top:0;left:0;width:0;height:0;border:none';
  document.body.appendChild(iframe);
  const doc = iframe.contentDocument;
  doc.open();
  doc.write(`<!DOCTYPE html><html><head><style>
    body{font-family:Calibri,'Yu Gothic UI',sans-serif;font-size:10.5pt;margin:72pt;color:#000}
    table{border-collapse:collapse;width:100%}td,th{border:1px solid #999;padding:4px 6px}
    h1{font-size:16pt}h2{font-size:13pt}p{margin-bottom:8pt}
    @page{size:A4;margin:1in}
  </style></head><body>${editor.innerHTML}</body></html>`);
  doc.close();
  iframe.contentWindow.focus();
  iframe.contentWindow.print();
  setTimeout(() => document.body.removeChild(iframe), 3000);
}

// ---- Page tracking (#8) ----
function updatePageInfo() {
  const isMobile = window.innerWidth < 769;
  if (isMobile) {
    // Reflow mode: estimate from line count
    const lineH = 22; // approx line height in reflow
    const linesPerPage = Math.floor(842 * 0.75 / lineH); // A4 height minus margins, roughly
    const contentH = editor.scrollHeight;
    const totalLines = Math.max(1, Math.ceil(contentH / lineH));
    const pages = Math.max(1, Math.ceil(totalLines / linesPerPage));
    const scrollTop = $('editArea').scrollTop;
    const currentPage = Math.min(pages, Math.floor(scrollTop / (linesPerPage * lineH)) + 1);
    $('pgInfo').textContent = `~${t('page')} ${currentPage} / ~${pages}`;
  } else {
    // Page mode: estimate from editor page layout
    const pageH = 1123; // A4 px
    const contentH = editor.scrollHeight;
    const pages = Math.max(1, Math.ceil(contentH / (pageH - 192)));
    const scrollTop = $('editArea').scrollTop;
    const currentPage = Math.min(pages, Math.floor(scrollTop / pageH) + 1);
    $('pgInfo').textContent = `${t('page')} ${currentPage} / ${pages}`;
  }
}
$('editArea').addEventListener('scroll', updatePageInfo);
editor.addEventListener('input', () => { updatePageInfo(); });
updatePageInfo();

// ---- Print ----
function handlePrint() {
  syncDocx();
  // Use layout engine to render pages, then print canvases
  try {
    const result = layout_document(currentDocx);
    const printWin = window.open('', '_blank', 'width=800,height=1100');
    printWin.document.write('<html><head><title>' + fileName + '</title>');
    printWin.document.write('<style>@page{size:A4;margin:0}body{margin:0}canvas{display:block;page-break-after:always;width:100%;height:auto}</style>');
    printWin.document.write('</head><body>');
    printWin.document.close();
    const SCALE = 2;
    let loaded = 0;
    for (const pg of result.pages) {
      const canvas = printWin.document.createElement('canvas');
      canvas.width = Math.round(pg.width * SCALE);
      canvas.height = Math.round(pg.height * SCALE);
      printWin.document.body.appendChild(canvas);
      const ctx = canvas.getContext('2d');
      ctx.scale(SCALE, SCALE);
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, pg.width, pg.height);
      renderPageToCanvas(ctx, pg);
      loaded++;
      if (loaded === result.pages.length) {
        setTimeout(() => { printWin.print(); }, 200);
      }
    }
  } catch(e) {
    // Fallback: browser print
    window.print();
  }
}
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'p') { e.preventDefault(); handlePrint(); }
});

  editArea.classList.toggle('reflow', mobile);
}
window.addEventListener('resize', checkReflow);
