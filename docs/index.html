                        if (drs.italic) span.style.fontStyle = 'italic';
                        if (drs.color) span.style.color = '#' + drs.color;
                    }

                    // Preserve visual styling (run-level overrides paragraph defaults)
                    if (run.style) {
                        if (run.style.bold) span.style.fontWeight = 'bold';
                        if (run.style.italic) span.style.fontStyle = 'italic';
                        if (run.style.underline) {
                            const uStyle = run.style.underline_style || 'single';
                            const uMap = {
                                'single': 'underline solid',
                                'double': 'underline double',
                                'thick': 'underline solid 2px',
                                'dotted': 'underline dotted',
                                'dash': 'underline dashed',
                                'wave': 'underline wavy',
                                'dottedHeavy': 'underline dotted 2px',
                                'dashHeavy': 'underline dashed 2px',
                                'wavyHeavy': 'underline wavy 2px',
                                'dashDot': 'underline dashed',
                                'dashDotDot': 'underline dashed',
                                'words': 'underline solid',
                            };
                            span.style.textDecoration = uMap[uStyle] || 'underline';
                        }
                        if (run.style.strikethrough) {
                            span.style.textDecoration = span.style.textDecoration
                                ? span.style.textDecoration + ' line-through'
                                : 'line-through';
                            if (run.style.double_strikethrough) {
                                span.style.textDecorationStyle = 'double';
                            }
                        }
                        if (run.style.color && !run.url) span.style.color = '#' + run.style.color;
                        if (run.style.font_size) span.style.fontSize = run.style.font_size + 'pt';
                        if (run.style.font_family || run.style.font_family_east_asia) {
                            const ea = run.style.font_family_east_asia ? "'" + run.style.font_family_east_asia + "', " : '';
                            const la = run.style.font_family || 'Calibri';
                            span.style.fontFamily = ea + la + ", 'Yu Gothic', 'Meiryo', 'Noto Sans JP', sans-serif";
                        }
                        if (run.style.highlight) {
                            span.style.backgroundColor = HIGHLIGHT_COLORS[run.style.highlight] || run.style.highlight;
                        } else if (run.style.shading) {
                            span.style.backgroundColor = '#' + run.style.shading;
                        }
                        // Superscript / Subscript
                        if (run.style.vertical_align === 'Superscript') {
                            span.style.verticalAlign = 'super';
                            span.style.fontSize = ((run.style.font_size || 11) * 0.6) + 'pt';
                        } else if (run.style.vertical_align === 'Subscript') {
                            span.style.verticalAlign = 'sub';
                            span.style.fontSize = ((run.style.font_size || 11) * 0.6) + 'pt';
                        }
                        // Character spacing (tracking)
                        if (run.style.character_spacing) {
                            span.style.letterSpacing = run.style.character_spacing + 'pt';
                        }
                        // Small caps / All caps
                        if (run.style.all_caps) {
                            span.style.textTransform = 'uppercase';
                        } else if (run.style.small_caps) {
                            span.style.fontVariant = 'small-caps';
                        }
                        // RTL run
                        if (run.style.rtl) {
                            span.style.direction = 'rtl';
                            span.style.unicodeBidi = 'embed';
                        }
                        // Hidden text
                        if (run.style.vanish) span.style.display = 'none';
                        // Text effects
                        if (run.style.outline) { span.style.webkitTextStroke = '1px'; span.style.color = span.style.color || 'transparent'; }
                        if (run.style.shadow) span.style.textShadow = '1px 1px 2px rgba(0,0,0,0.3)';
                        if (run.style.emboss) span.style.textShadow = '-1px -1px 0 rgba(255,255,255,0.6), 1px 1px 0 rgba(0,0,0,0.3)';
                        if (run.style.imprint) span.style.textShadow = '1px 1px 0 rgba(255,255,255,0.6), -1px -1px 0 rgba(0,0,0,0.3)';
                        // Kerning — enable when font size >= threshold
                        if (run.style.kern) {
                            const fs = run.style.font_size || (drs && drs.font_size) || 11;
                            span.style.fontKerning = fs >= run.style.kern ? 'normal' : 'none';
                        }
                        // Fit text to width — scale font to fit
                        if (run.style.fit_text) {
                            span.style.display = 'inline-block';
                            span.style.width = run.style.fit_text + 'pt';
                            span.style.overflow = 'hidden';
                            span.style.whiteSpace = 'nowrap';
                            // Use CSS transform scaleX to squeeze text
                            const measure = document.createElement('span');
                            measure.style.cssText = span.style.cssText;
                            measure.style.display = 'inline';
                            measure.style.visibility = 'hidden';
                            measure.style.position = 'absolute';
                            measure.textContent = span.textContent;
                            document.body.appendChild(measure);
                            const naturalW = measure.offsetWidth;
                            document.body.removeChild(measure);
                            if (naturalW > 0) {
                                const targetPx = run.style.fit_text * 96 / 72;
                                const scale = targetPx / naturalW;
                                if (scale < 1) {
                                    span.style.transform = 'scaleX(' + scale.toFixed(3) + ')';
                                    span.style.transformOrigin = 'left';
                                }
                            }
                        }
                        // Complex script properties
                        if (run.style.bold_cs) span.style.fontWeight = 'bold';
                        if (run.style.italic_cs) span.style.fontStyle = 'italic';
                        if (run.style.font_size_cs && !run.style.font_size) {
                            span.style.fontSize = run.style.font_size_cs + 'pt';
                        }
                        // East Asian layout: combine (kumimoji)
                        if (run.style.combine) {
                            span.style.writingMode = 'horizontal-tb';
                            span.style.textCombineUpright = 'all';
                        }
                        // East Asian layout: vertical-in-horizontal (tate-chu-yoko)
                        if (run.style.vert_in_horz) {
                            span.style.writingMode = 'horizontal-tb';
                            span.style.textCombineUpright = 'all';
                        }
                    }

                    // Hyperlink wrapping
                    if (run.url) {
                        span.style.color = '#0563C1';
                        span.style.textDecoration = 'underline';
                        span.style.cursor = 'pointer';
                        span.title = run.url;
                        span.addEventListener('click', (e) => {
                            if (e.ctrlKey || e.metaKey) {
                                if (run.url.startsWith('#')) {
                                    // Internal bookmark link
                                    const anchor = document.getElementById('bk_' + run.url.substring(1));
                                    if (anchor) anchor.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                } else {
                                    window.open(run.url, '_blank', 'noopener,noreferrer');
                                }
                            }
                        });
                    }

                    // Bookmark anchor
                    if (run.bookmark_name) {
                        span.id = 'bk_' + run.bookmark_name;
                    }

                    // Prevent Enter from creating new DOM nodes inside span
                    span.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') e.preventDefault();
                    });

                    paraDiv.appendChild(span);
                    } // end segments loop
                }

                // Empty paragraph — show placeholder
                if (para.runs.length === 0) {
                    const span = document.createElement('span');
                    span.className = 'edit-run';
                    span.innerHTML = '&nbsp;';
                    paraDiv.appendChild(span);
                }

                blocksContainer.appendChild(paraDiv);
                prevParaStyleId = (para.style && para.style.style_id) || null;
                bodyParaIdx++;

            } else if (block.Table) {
                const table = block.Table;
                const tableEl = document.createElement('table');
                tableEl.className = 'edit-table';
                tableEl.style.borderCollapse = 'collapse';

                // Table width
                if (table.style && table.style.width) {
                    if (table.style.width_type === 'pct') {
                        tableEl.style.width = table.style.width + '%';
                    } else {
                        tableEl.style.width = table.style.width + 'pt';
                    }
                }
                // Table indent
                if (table.style && table.style.indent) {
                    tableEl.style.marginLeft = table.style.indent + 'pt';
                }
                // Table cell spacing
                if (table.style && table.style.cell_spacing) {
                    tableEl.style.borderCollapse = 'separate';
                    tableEl.style.borderSpacing = table.style.cell_spacing + 'pt';
                }
                // Table layout mode (fixed vs auto)
                if (table.style && table.style.layout === 'fixed') {
                    tableEl.style.tableLayout = 'fixed';
                }
                // Table alignment
                if (table.style && table.style.alignment) {
                    if (table.style.alignment === 'center') {
                        tableEl.style.marginLeft = 'auto';
                        tableEl.style.marginRight = 'auto';
                    } else if (table.style.alignment === 'right') {
                        tableEl.style.marginLeft = 'auto';
                    }
                }

                // Apply table border styles
                if (table.style && table.style.border) {
                    const bw = (table.style.border_width || 0.5) + 'pt';
                    const bc = table.style.border_color ? '#' + table.style.border_color : '#000';
                    const bs = (table.style.border_style === 'double') ? 'double' :
                               (table.style.border_style === 'dashed') ? 'dashed' :
                               (table.style.border_style === 'dotted') ? 'dotted' : 'solid';
                    tableEl.style.border = `${bw} ${bs} ${bc}`;
                    // Apply to cells via CSS custom property
                    tableEl.dataset.borderWidth = bw;
                    tableEl.dataset.borderColor = bc;
                    tableEl.dataset.borderStyle = bs;
                }

                // Pre-pass: compute rowspan for vertical merges
                const rowspanMap = {}; // "rowIdx-colIdx" -> rowspan count
                for (let ri = 0; ri < table.rows.length; ri++) {
                    let ci = 0;
                    for (const cell of table.rows[ri].cells) {
                        if (cell.v_merge === 'restart') {
                            let span = 1;
                            for (let rj = ri + 1; rj < table.rows.length; rj++) {
                                let cj = 0;
                                let found = false;
                                for (const c2 of table.rows[rj].cells) {
                                    if (cj === ci && c2.v_merge === 'continue') {
                                        span++;
                                        found = true;
                                        break;
                                    }
                                    cj += (c2.grid_span || 1);
                                }
                                if (!found) break;
                            }
                            rowspanMap[ri + '-' + ci] = span;
                        }
                        ci += (cell.grid_span || 1);
                    }
                }

                const tblLook = table.style && table.style.tbl_look;
                for (let ri = 0; ri < table.rows.length; ri++) {
                    const row = table.rows[ri];
                    const tr = document.createElement('tr');
                    if (row.height) tr.style.height = row.height + 'pt';
                    if (row.cant_split) tr.style.breakInside = 'avoid';
                    // Table conditional formatting: banded rows, first/last row
                    if (tblLook) {
                        if (tblLook.first_row && ri === 0) {
                            tr.style.fontWeight = 'bold';
                            tr.style.backgroundColor = '#4472C4';
                            tr.style.color = '#FFFFFF';
                        } else if (tblLook.last_row && ri === table.rows.length - 1) {
                            tr.style.fontWeight = 'bold';
                            tr.style.borderTop = '2pt solid #4472C4';
                        } else if (tblLook.banded_rows) {
                            const dataRow = tblLook.first_row ? ri - 1 : ri;
                            const bandSize = tblLook.row_band_size || 1;
                            if (Math.floor(dataRow / bandSize) % 2 === 1) {
                                tr.style.backgroundColor = '#D9E2F3';
                            }
                        }
                    }
                    const totalCols = row.cells.reduce((sum, c) => sum + (c.grid_span || 1), 0);
                    let ci = 0;
                    for (const cell of row.cells) {
                        // Skip cells that are vertical merge continuations
                        if (cell.v_merge === 'continue') {
                            ci += (cell.grid_span || 1);
                            continue;
                        }

                        const td = document.createElement('td');
                        // Table conditional formatting: first/last column, banded columns
                        if (tblLook) {
                            if (tblLook.first_column && ci === 0) {
                                td.style.fontWeight = 'bold';
                            }
                            if (tblLook.last_column && ci + (cell.grid_span || 1) >= totalCols) {
                                td.style.fontWeight = 'bold';
                            }
                            if (tblLook.banded_columns && !tblLook.first_row) {
                                const bandSize = tblLook.col_band_size || 1;
                                if (Math.floor(ci / bandSize) % 2 === 1) {
                                    td.style.backgroundColor = td.style.backgroundColor || '#D9E2F3';
                                }
                            }
                        }
                        // Apply table border to cells
                        if (table.style && table.style.border) {
                            const bw = tableEl.dataset.borderWidth || '0.5pt';
                            const bc = tableEl.dataset.borderColor || '#000';
                            const bs = tableEl.dataset.borderStyle || 'solid';
                            td.style.border = `${bw} ${bs} ${bc}`;
                        }
                        // Cell width
                        if (cell.width) td.style.width = cell.width + 'pt';
                        // Horizontal merge (gridSpan)
                        if (cell.grid_span && cell.grid_span > 1) {
                            td.colSpan = cell.grid_span;
                        }
                        // Vertical merge rowspan from pre-pass
                        const rsKey = ri + '-' + ci;
                        if (rowspanMap[rsKey] && rowspanMap[rsKey] > 1) {
                            td.rowSpan = rowspanMap[rsKey];
                        }
                        // Cell shading
                        if (cell.shading) td.style.backgroundColor = '#' + cell.shading;
                        // Vertical alignment
                        if (cell.v_align) {
                            td.style.verticalAlign = cell.v_align === 'center' ? 'middle' : cell.v_align;
                        }
                        // Cell-specific borders
                        if (cell.borders) {
                            const cb = cell.borders;
                            const bdrCss = (d) => {
                                if (!d) return '';
                                const w = d.width ? d.width + 'pt' : '1pt';
                                const c = d.color ? '#' + d.color : '#000';
                                const s = d.style === 'double' ? 'double' :
                                          d.style === 'dashed' ? 'dashed' :
                                          d.style === 'dotted' ? 'dotted' : 'solid';
                                return `${w} ${s} ${c}`;
                            };
                            if (cb.top) td.style.borderTop = bdrCss(cb.top);
                            if (cb.bottom) td.style.borderBottom = bdrCss(cb.bottom);
                            if (cb.left) td.style.borderLeft = bdrCss(cb.left);
                            if (cb.right) td.style.borderRight = bdrCss(cb.right);
                        }
                        // Cell margins (cell-level overrides table-level defaults)
                        const cm = cell.margins || (table.style && table.style.default_cell_margins);
                        if (cm) {
                            if (cm.top) td.style.paddingTop = cm.top + 'pt';
                            if (cm.bottom) td.style.paddingBottom = cm.bottom + 'pt';
                            if (cm.left) td.style.paddingLeft = cm.left + 'pt';
                            if (cm.right) td.style.paddingRight = cm.right + 'pt';
                        }

                        // Render blocks inside table cells (supports nested tables)
                        renderCellBlocks(cell.blocks, td);
                        tr.appendChild(td);
                        ci += (cell.grid_span || 1);
                    }
                    // Append to thead for header rows, tbody otherwise
                    if (row.header) {
                        let thead = tableEl.querySelector('thead');
                        if (!thead) { thead = document.createElement('thead'); tableEl.appendChild(thead); }
                        thead.appendChild(tr);
                    } else {
                        let tbody = tableEl.querySelector('tbody');
                        if (!tbody) { tbody = document.createElement('tbody'); tableEl.appendChild(tbody); }
                        tbody.appendChild(tr);
                    }
                }
                blocksContainer.appendChild(tableEl);

            } else if (block.Image) {
                const img = block.Image;
                if (img.data && img.data.length > 0) {
                    const imgEl = document.createElement('img');
                    const ct = img.content_type || 'image/png';
                    let binary = '';
                    for (let i = 0; i < img.data.length; i++) binary += String.fromCharCode(img.data[i]);
                    imgEl.src = `data:${ct};base64,${btoa(binary)}`;
                    imgEl.style.maxWidth = '100%';
                    imgEl.style.height = 'auto';
                    imgEl.style.margin = '8px 0';
                    // Image cropping via clip-path
                    if (img.crop) {
                        const t = img.crop.top || 0;
                        const r = img.crop.right || 0;
                        const b = img.crop.bottom || 0;
                        const l = img.crop.left || 0;
                        imgEl.style.clipPath = `inset(${t}% ${r}% ${b}% ${l}%)`;
                    }
                    blocksContainer.appendChild(imgEl);
                }
            }
        }

        // Append column wrapper if multi-column
        if (blocksContainer !== pageDiv) {
            pageDiv.appendChild(blocksContainer);
        }

        // Render floating images
        if (page.floating_images && page.floating_images.length > 0) {
            for (const fImg of page.floating_images) {
                if (fImg.data && fImg.data.length > 0) {
                    const fImgEl = document.createElement('img');
                    const ct = fImg.content_type || 'image/png';
                    let binary = '';
                    for (let i = 0; i < fImg.data.length; i++) binary += String.fromCharCode(fImg.data[i]);
                    fImgEl.src = `data:${ct};base64,${btoa(binary)}`;
                    fImgEl.style.position = 'absolute';
                    if (fImg.position) {
                        // Anchor reference: adjust position based on h_relative/v_relative
                        let xOff = fImg.position.x;
                        let yOff = fImg.position.y;
                        const hr = fImg.position.h_relative || 'column';
                        const vr = fImg.position.v_relative || 'paragraph';
                        // For page-relative, subtract page margins
                        if (hr === 'page' && page.margin) xOff -= 0; // already relative to page
                        else if (hr === 'margin' && page.margin) xOff += 0; // relative to margin = default
                        // column is default behavior
                        if (vr === 'page' && page.margin) yOff -= 0;
                        fImgEl.style.left = xOff + 'pt';
                        fImgEl.style.top = yOff + 'pt';
                    }
                    fImgEl.style.width = fImg.width + 'pt';
                    fImgEl.style.height = fImg.height + 'pt';
                    if (fImg.alt_text) fImgEl.alt = fImg.alt_text;
                    if (fImg.crop) {
                        const t = fImg.crop.top || 0;
                        const r = fImg.crop.right || 0;
                        const b = fImg.crop.bottom || 0;
                        const l = fImg.crop.left || 0;
                        fImgEl.style.clipPath = `inset(${t}% ${r}% ${b}% ${l}%)`;
                    }
                    // Wrap type behavior
                    if (fImg.wrap_type === 'None') {
                        fImgEl.style.zIndex = '10';
                        fImgEl.style.pointerEvents = 'none';
                    } else if (fImg.wrap_type === 'TopAndBottom') {
                        // Simulate top-and-bottom: use CSS shape-outside not available,
                        // just ensure proper z-index
                        fImgEl.style.zIndex = '1';
                    } else {
                        // Square / Tight: use CSS float for approximate wrapping
                        fImgEl.style.zIndex = '1';
                    }
                    pageDiv.appendChild(fImgEl);
                }
            }
        }

        // Render text boxes
        if (page.text_boxes && page.text_boxes.length > 0) {
            for (const tb of page.text_boxes) {
                const tbDiv = document.createElement('div');
                tbDiv.style.position = 'absolute';
                if (tb.position) {
                    tbDiv.style.left = tb.position.x + 'pt';
                    tbDiv.style.top = tb.position.y + 'pt';
                }
                tbDiv.style.width = tb.width + 'pt';
                tbDiv.style.minHeight = tb.height + 'pt';
                if (tb.border) tbDiv.style.border = '1px solid #000';
                if (tb.fill) tbDiv.style.backgroundColor = '#' + tb.fill;
                tbDiv.style.padding = '4pt';
                tbDiv.style.overflow = 'hidden';
                tbDiv.style.zIndex = '5';
                tbDiv.style.boxSizing = 'border-box';
                for (const tbBlock of tb.blocks) {
                    if (tbBlock.Paragraph) {
                        const tbPara = document.createElement('div');
                        if (tbBlock.Paragraph.alignment === 'Center') tbPara.style.textAlign = 'center';
                        else if (tbBlock.Paragraph.alignment === 'Right') tbPara.style.textAlign = 'right';
                        else if (tbBlock.Paragraph.alignment === 'Justify') tbPara.style.textAlign = 'justify';
                        for (const run of tbBlock.Paragraph.runs) {
                            const span = document.createElement('span');
                            span.textContent = run.text;
                            if (run.style) {
                                if (run.style.bold) span.style.fontWeight = 'bold';
                                if (run.style.italic) span.style.fontStyle = 'italic';
                                if (run.style.underline) span.style.textDecoration = 'underline';
                                if (run.style.color) span.style.color = '#' + run.style.color;
                                if (run.style.font_size) span.style.fontSize = run.style.font_size + 'pt';
                                if (run.style.font_family || run.style.font_family_east_asia) {
                            const ea = run.style.font_family_east_asia ? "'" + run.style.font_family_east_asia + "', " : '';
                            const la = run.style.font_family || 'Calibri';
                            span.style.fontFamily = ea + la + ", 'Yu Gothic', 'Meiryo', 'Noto Sans JP', sans-serif";
                        }
                            }
                            tbPara.appendChild(span);
                        }
                        if (tbBlock.Paragraph.runs.length === 0) tbPara.innerHTML = '&nbsp;';
                        tbDiv.appendChild(tbPara);
                    }
                }
                pageDiv.appendChild(tbDiv);
            }
        }

        // Render shapes (DrawingML / VML)
        if (page.shapes && page.shapes.length > 0) {
            for (const shape of page.shapes) {
                const shapeDiv = document.createElement('div');
                shapeDiv.style.position = 'absolute';
                if (shape.position) {
                    shapeDiv.style.left = shape.position.x + 'pt';
                    shapeDiv.style.top = shape.position.y + 'pt';
                }
                shapeDiv.style.width = shape.width + 'pt';
                shapeDiv.style.height = shape.height + 'pt';
                shapeDiv.style.zIndex = '3';
                shapeDiv.style.boxSizing = 'border-box';

                // Fill (gradient or solid)
                if (shape.gradient_stops && shape.gradient_stops.length >= 2) {
                    const angle = (shape.gradient_angle || 0) + 90; // CSS angle offset
                    const stops = shape.gradient_stops.map(s => '#' + s.color + ' ' + s.position + '%').join(', ');
                    shapeDiv.style.background = `linear-gradient(${angle}deg, ${stops})`;
                } else if (shape.fill) {
                    shapeDiv.style.backgroundColor = '#' + shape.fill;
                }
                // Stroke
                if (shape.stroke_color || shape.stroke_width) {
                    const sw = (shape.stroke_width || 0.75) + 'pt';
                    const sc = shape.stroke_color ? '#' + shape.stroke_color : '#000';
                    shapeDiv.style.border = `${sw} solid ${sc}`;
                }
                // Shape-specific styling
                const st = shape.shape_type;
                if (st === 'ellipse' || st === 'oval') {
                    shapeDiv.style.borderRadius = '50%';
                } else if (st === 'roundRect' || st === 'roundrect') {
                    shapeDiv.style.borderRadius = '8pt';
                } else if (st === 'line') {
                    shapeDiv.style.borderTop = (shape.stroke_width || 1) + 'pt solid ' + (shape.stroke_color ? '#' + shape.stroke_color : '#000');
                    shapeDiv.style.height = '0';
                    shapeDiv.style.backgroundColor = 'transparent';
                } else if (st === 'triangle' || st === 'rtTriangle') {
                    // CSS triangle approximation
                    shapeDiv.style.backgroundColor = 'transparent';
                    shapeDiv.style.border = 'none';
                    shapeDiv.style.width = '0';
                    shapeDiv.style.height = '0';
                    shapeDiv.style.borderLeft = (shape.width / 2) + 'pt solid transparent';
                    shapeDiv.style.borderRight = (shape.width / 2) + 'pt solid transparent';
                    shapeDiv.style.borderBottom = shape.height + 'pt solid ' + (shape.fill ? '#' + shape.fill : '#4472C4');
                }
                // Rotation
                if (shape.rotation) {
                    shapeDiv.style.transform = `rotate(${shape.rotation}deg)`;
                }
                // Text inside shape
                if (shape.text_blocks && shape.text_blocks.length > 0) {
                    shapeDiv.style.display = 'flex';
                    shapeDiv.style.alignItems = 'center';
                    shapeDiv.style.justifyContent = 'center';
                    shapeDiv.style.padding = '4pt';
                    shapeDiv.style.overflow = 'hidden';
                    renderCellBlocks(shape.text_blocks, shapeDiv);
                }
                pageDiv.appendChild(shapeDiv);
            }
        }

        // Render footnotes
        if (page.footnotes && page.footnotes.length > 0) {
            const fnDiv = document.createElement('div');
            fnDiv.className = 'edit-footnotes';
            fnDiv.style.borderTop = '1px solid #999';
            fnDiv.style.marginTop = '12pt';
            fnDiv.style.paddingTop = '6pt';
            fnDiv.style.fontSize = '9pt';
            fnDiv.style.color = '#333';
            for (const fn of page.footnotes) {
                const noteDiv = document.createElement('div');
                noteDiv.style.marginBottom = '2pt';
                const numSpan = document.createElement('span');
                numSpan.textContent = fn.number + '. ';
                numSpan.style.fontWeight = 'bold';
                numSpan.style.verticalAlign = 'super';
                numSpan.style.fontSize = '0.8em';
                noteDiv.appendChild(numSpan);
                for (const block of fn.blocks) {
                    if (block.Paragraph) {
                        for (const run of block.Paragraph.runs) {
                            const span = document.createElement('span');
                            span.textContent = run.text;
                            if (run.style && run.style.bold) span.style.fontWeight = 'bold';
                            if (run.style && run.style.italic) span.style.fontStyle = 'italic';
                            noteDiv.appendChild(span);
                        }
                    }
                }
                fnDiv.appendChild(noteDiv);
            }
            pageDiv.appendChild(fnDiv);
        }

        // Render endnotes
        if (page.endnotes && page.endnotes.length > 0) {
            const enDiv = document.createElement('div');
            enDiv.className = 'edit-endnotes';
            enDiv.style.borderTop = '2px solid #999';
            enDiv.style.marginTop = '12pt';
            enDiv.style.paddingTop = '6pt';
            enDiv.style.fontSize = '9pt';
            enDiv.style.color = '#333';
            const enTitle = document.createElement('div');
            enTitle.textContent = 'Endnotes';
            enTitle.style.fontWeight = 'bold';
            enTitle.style.marginBottom = '4pt';
            enDiv.appendChild(enTitle);
            for (const en of page.endnotes) {
                const noteDiv = document.createElement('div');
                noteDiv.style.marginBottom = '2pt';
                const numSpan = document.createElement('span');
                numSpan.textContent = en.number + '. ';
                numSpan.style.fontWeight = 'bold';
                numSpan.style.verticalAlign = 'super';
                numSpan.style.fontSize = '0.8em';
                noteDiv.appendChild(numSpan);
                for (const block of en.blocks) {
                    if (block.Paragraph) {
                        for (const run of block.Paragraph.runs) {
                            const span = document.createElement('span');
                            span.textContent = run.text;
                            if (run.style && run.style.bold) span.style.fontWeight = 'bold';
                            if (run.style && run.style.italic) span.style.fontStyle = 'italic';
                            noteDiv.appendChild(span);
                        }
                    }
                }
                enDiv.appendChild(noteDiv);
            }
            pageDiv.appendChild(enDiv);
        }

        // Render footer
        if (page.footer && page.footer.length > 0) {
            const footerDiv = document.createElement('div');
            footerDiv.className = 'edit-footer';
            footerDiv.style.borderTop = '1px solid #e0e0e0';
            footerDiv.style.marginTop = '8pt';
            footerDiv.style.paddingTop = '4pt';
            footerDiv.style.color = '#666';
            footerDiv.style.fontSize = '9pt';
            for (const fBlock of page.footer) {
                if (fBlock.Paragraph) {
                    const fPara = document.createElement('div');
                    if (fBlock.Paragraph.alignment === 'Center') fPara.style.textAlign = 'center';
                    else if (fBlock.Paragraph.alignment === 'Right') fPara.style.textAlign = 'right';
                    else if (fBlock.Paragraph.alignment === 'Justify') fPara.style.textAlign = 'justify';
                    if (fBlock.Paragraph.style) {
                        if (fBlock.Paragraph.style.space_before) fPara.style.marginTop = fBlock.Paragraph.style.space_before + 'pt';
                        if (fBlock.Paragraph.style.space_after) fPara.style.marginBottom = fBlock.Paragraph.style.space_after + 'pt';
                        if (fBlock.Paragraph.style.indent_left) fPara.style.paddingLeft = fBlock.Paragraph.style.indent_left + 'pt';
                    }
                    for (const run of fBlock.Paragraph.runs) {
                        const span = document.createElement('span');
                        span.textContent = run.text;
                        applyRunStyle(span, run);
                        fPara.appendChild(span);
                    }
                    if (fBlock.Paragraph.runs.length === 0) fPara.innerHTML = '&nbsp;';
                    footerDiv.appendChild(fPara);
                }
            }
            pageDiv.appendChild(footerDiv);
        }

        container.appendChild(pageDiv);
    }

    // Render comments panel (document-level)
    if (doc.comments && doc.comments.length > 0) {
        const commentsDiv = document.createElement('div');
        commentsDiv.className = 'edit-comments-panel';
        commentsDiv.style.maxWidth = '800px';
        commentsDiv.style.margin = '16px auto';
        commentsDiv.style.padding = '12pt';
        commentsDiv.style.background = '#fffde7';
        commentsDiv.style.border = '1px solid #fdd835';
        commentsDiv.style.borderRadius = '8px';
        const commTitle = document.createElement('div');
        commTitle.textContent = 'Comments';
        commTitle.style.fontWeight = 'bold';
        commTitle.style.marginBottom = '8pt';
        commTitle.style.fontSize = '11pt';
        commentsDiv.appendChild(commTitle);
        for (const comment of doc.comments) {
            const cDiv = document.createElement('div');
            cDiv.style.marginBottom = '6pt';
            cDiv.style.paddingBottom = '6pt';
            cDiv.style.borderBottom = '1px solid #e0d68a';
            const metaSpan = document.createElement('span');
            metaSpan.style.fontWeight = 'bold';
            metaSpan.style.fontSize = '9pt';
            metaSpan.style.color = '#555';
            metaSpan.textContent = (comment.author || 'Unknown') + (comment.date ? ' (' + comment.date.substring(0, 10) + ')' : '') + ': ';
            cDiv.appendChild(metaSpan);
            for (const cBlock of comment.blocks) {
                if (cBlock.Paragraph) {
                    for (const run of cBlock.Paragraph.runs) {
                        const span = document.createElement('span');
                        span.textContent = run.text;
                        span.style.fontSize = '10pt';
                        cDiv.appendChild(span);
                    }
                }
            }
            commentsDiv.appendChild(cDiv);
        }
        container.appendChild(commentsDiv);
    }
}

// === XLSX RENDERER ===
function colName(idx) {
    let name = '';
    let n = idx;
    while (n >= 0) {
        name = String.fromCharCode(65 + (n % 26)) + name;
        n = Math.floor(n / 26) - 1;
    }
    return name;
}

// Number formatting helper
function formatCellValue(val, style) {
    let raw = '';
    let isNumber = false;
    if (typeof val === 'object' && val !== null) {
        if ('String' in val) raw = val.String;
        else if ('Number' in val) { raw = val.Number; isNumber = true; }
        else if ('Boolean' in val) return val.Boolean ? 'TRUE' : 'FALSE';
        else if ('Error' in val) return val.Error;
        else if ('Empty' in val) return '';
    } else if (typeof val === 'string') {
        return val;
    }
    if (!isNumber) return String(raw);

    const fmt = style && style.number_format;
    if (!fmt || fmt === 'General') {
        if (raw === Math.floor(raw)) return String(Math.floor(raw));
        return String(raw);
    }

    // Date formats (Excel serial number to date)
    if (fmt.includes('yy') || (fmt.includes('mm') && fmt.includes('dd'))) {
        const base = new Date(1899, 11, 30);
        const d = new Date(base.getTime() + raw * 86400000);
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const yy = String(d.getFullYear()).slice(-2);
        const yyyy = String(d.getFullYear());
        if (fmt.includes('h:mm') || fmt.includes('H:mm')) {
            const hh = String(d.getHours());
            const mi = String(d.getMinutes()).padStart(2, '0');
            return `${d.getMonth()+1}/${d.getDate()}/${yy} ${hh}:${mi}`;
        }
        if (fmt.includes('yyyy')) return `${yyyy}-${mm}-${dd}`;
        return `${mm}-${dd}-${yy}`;
    }

    // Percentage
    if (fmt.includes('%')) {
        const pct = raw * 100;
        if (fmt.includes('.00')) return pct.toFixed(2) + '%';
        return Math.round(pct) + '%';
    }

    // Scientific
    if (fmt.includes('E+')) {
        return raw.toExponential(2).toUpperCase();
    }

    // Decimal fixed (0.00 or #,##0.00)
    if (fmt === '0.00' || fmt.includes('#,##0.00')) {
        const fixed = raw.toFixed(2);
        if (fmt.includes(',')) {
            return Number(fixed).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        return fixed;
    }

    // Comma thousands (#,##0)
    if (fmt === '#,##0' || fmt.includes(',')) {
        return Math.round(raw).toLocaleString('en-US');
    }

    // Fixed integer (0)
    if (fmt === '0') return String(Math.round(raw));

    // Fallback
    if (raw === Math.floor(raw)) return String(Math.floor(raw));
    return String(raw);
}

// Build merge coverage info
function buildMergeInfo(mergeCells) {
    const covered = new Set();
    const origins = new Map();
    if (!mergeCells) return { covered, origins };
    for (const mc of mergeCells) {
        const rowspan = mc.end_row - mc.start_row + 1;
        const colspan = mc.end_col - mc.start_col + 1;
        origins.set(`${mc.start_row},${mc.start_col}`, { rowspan, colspan });
        for (let r = mc.start_row; r <= mc.end_row; r++) {
            for (let c = mc.start_col; c <= mc.end_col; c++) {
                if (r !== mc.start_row || c !== mc.start_col) {
                    covered.add(`${r},${c}`);
                }
            }
        }
    }
    return { covered, origins };
}

function getColWidthPx(sheet, colIdx) {
    const charWidth = 7;
    if (sheet.col_widths && colIdx < sheet.col_widths.length) {
        return Math.round(sheet.col_widths[colIdx] * charWidth);
    }
    return Math.round((sheet.default_col_width || 8.43) * charWidth);
}

function getRowHeightPx(row, defaultRowHeight) {
    if (row && row.height != null) return Math.round(row.height * 1.333);
    return Math.round((defaultRowHeight || 15) * 1.333);
}

// === XLSX EDITABLE RENDERER ===
function renderEditableXlsx(workbook) {
    const container = document.getElementById('pages-container');
    container.innerHTML = '';

    // Formula bar
    const formulaBar = document.createElement('div');
    formulaBar.className = 'formula-bar';
    const cellRefEl = document.createElement('div');
    cellRefEl.className = 'cell-ref';
    cellRefEl.textContent = 'A1';
    const fxLabel = document.createElement('div');
    fxLabel.className = 'fx-label';
    fxLabel.textContent = 'fx';
    const formulaInput = document.createElement('input');
    formulaInput.className = 'formula-input';
    formulaBar.appendChild(cellRefEl);
    formulaBar.appendChild(fxLabel);
    formulaBar.appendChild(formulaInput);

    const tabs = document.createElement('div');
    tabs.className = 'sheet-tabs';

    const wrapper = document.createElement('div');
    wrapper.className = 'spreadsheet-wrapper';

    // Range selection state
    let rangeStart = null; // {r, c}
    let rangeEnd = null;
    let isSelecting = false;

    function clearRangeSelection() {
        wrapper.querySelectorAll('.range-selected, .range-border-top, .range-border-bottom, .range-border-left, .range-border-right').forEach(el => {
            el.classList.remove('range-selected', 'range-border-top', 'range-border-bottom', 'range-border-left', 'range-border-right');
        });
        wrapper.querySelectorAll('th.col-selected, th.row-selected').forEach(el => {
            el.classList.remove('col-selected', 'row-selected');
        });
    }

    function applyRangeSelection() {
        clearRangeSelection();
        if (!rangeStart || !rangeEnd) return;
        const r1 = Math.min(rangeStart.r, rangeEnd.r), r2 = Math.max(rangeStart.r, rangeEnd.r);
        const c1 = Math.min(rangeStart.c, rangeEnd.c), c2 = Math.max(rangeStart.c, rangeEnd.c);

        // Update cell ref display
        if (r1 === r2 && c1 === c2) {
            cellRefEl.textContent = colName(c1) + r1;
        } else {
            cellRefEl.textContent = colName(c1) + r1 + ':' + colName(c2) + r2;
        }

        // Highlight column and row headers
        const headerCells = wrapper.querySelectorAll('thead th');
        for (let c = c1; c <= c2; c++) {
            if (headerCells[c + 1]) headerCells[c + 1].classList.add('col-selected');
        }
        const rowHeaders = wrapper.querySelectorAll('th.row-header');
        for (let r = r1; r <= r2; r++) {
            const rh = rowHeaders[r - 1]; // rows are 1-indexed
            if (rh) rh.classList.add('row-selected');
        }

        for (let r = r1; r <= r2; r++) {
            for (let c = c1; c <= c2; c++) {
                const cell = wrapper.querySelector(`td.edit-cell[data-row="${r}"][data-col="${c}"]`);
                if (!cell) continue;
                cell.classList.add('range-selected');
                if (r === r1) cell.classList.add('range-border-top');
                if (r === r2) cell.classList.add('range-border-bottom');
                if (c === c1) cell.classList.add('range-border-left');
                if (c === c2) cell.classList.add('range-border-right');
            }
        }
    }

    function showSheet(idx) {
        for (const t of tabs.children) t.classList.remove('active');
        tabs.children[idx].classList.add('active');

        const sheet = workbook.sheets[idx];
        const dataColCount = sheet.col_count || 1;
        const colCount = Math.max(dataColCount, 26);
        const { covered, origins } = buildMergeInfo(sheet.merge_cells);

        const rowMap = {};
        let maxRow = 0;
        for (const row of sheet.rows) {
            rowMap[row.index] = row;
            if (row.index > maxRow) maxRow = row.index;
        }
        const minRows = 50;
        if (maxRow < minRows) maxRow = minRows;

        wrapper.innerHTML = '';
        const table = document.createElement('table');

        // Colgroup for column widths
        const colgroup = document.createElement('colgroup');
        const rowHeaderCol = document.createElement('col');
        rowHeaderCol.style.width = '40px';
        colgroup.appendChild(rowHeaderCol);
        for (let c = 0; c < colCount; c++) {
            const col = document.createElement('col');
            col.style.width = getColWidthPx(sheet, c) + 'px';
            colgroup.appendChild(col);
        }
        table.appendChild(colgroup);

        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        headerRow.innerHTML = '<th class="row-header"></th>';
        for (let c = 0; c < colCount; c++) {
            const th = document.createElement('th');
            th.textContent = colName(c);
            headerRow.appendChild(th);
        }
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        for (let r = 1; r <= maxRow; r++) {
            const row = rowMap[r];
            const tr = document.createElement('tr');
            const rowH = getRowHeightPx(row, sheet.default_row_height);
            tr.style.height = rowH + 'px';

            const th = document.createElement('th');
            th.className = 'row-header';
            th.textContent = r;
            tr.appendChild(th);

            const cellMap = {};
            if (row) {
                for (const cell of row.cells) cellMap[cell.col] = cell;
            }

            for (let c = 0; c < colCount; c++) {
                const key = `${r},${c}`;
                if (covered.has(key)) continue;

                const td = document.createElement('td');
                td.contentEditable = 'true';
                td.className = 'edit-cell';
                td.dataset.sheet = idx;
                td.dataset.row = r;
                td.dataset.col = c;

                const merge = origins.get(key);
                if (merge) {
                    if (merge.rowspan > 1) td.rowSpan = merge.rowspan;
                    if (merge.colspan > 1) td.colSpan = merge.colspan;
                }

                const cell = cellMap[c];
                let display = '';
                if (cell) {
                    display = formatCellValue(cell.value, cell.style);
                    if (cell.style) {
                        if (cell.style.bold) td.style.fontWeight = 'bold';
                        if (cell.style.italic) td.style.fontStyle = 'italic';
                        if (cell.style.font_color) td.style.color = '#' + cell.style.font_color;
                        if (cell.style.bg_color) td.style.background = '#' + cell.style.bg_color;
                        if (cell.style.horizontal_align) td.style.textAlign = cell.style.horizontal_align;
                        if (cell.style.border_top) td.style.borderTop = '1px solid #333';
                        if (cell.style.border_bottom) td.style.borderBottom = '1px solid #333';
                        if (cell.style.border_left) td.style.borderLeft = '1px solid #333';
                        if (cell.style.border_right) td.style.borderRight = '1px solid #333';
                        if (cell.style.font_size) td.style.fontSize = cell.style.font_size + 'pt';
                    }
                    // Numbers default right-align
                    if (cell.value && typeof cell.value === 'object' && 'Number' in cell.value) {
                        if (!cell.style || !cell.style.horizontal_align) {
                            td.style.textAlign = 'right';
                        }
                    }
                }
                td.textContent = display;
                td.dataset.original = display;

                td.addEventListener('focus', () => {
                    cellRefEl.textContent = colName(c) + r;
                    formulaInput.value = td.textContent;
                });
                td.addEventListener('input', () => {
                    formulaInput.value = td.textContent;
                });
                td.addEventListener('keydown', (e) => {
                    function moveTo(dr, dc) {
                        const nr = r + dr, nc = c + dc;
                        const next = wrapper.querySelector(
                            `td.edit-cell[data-row="${nr}"][data-col="${nc}"]`
                        );
                        if (next) { e.preventDefault(); next.focus(); }
                    }
                    if (e.key === 'Tab') {
                        e.preventDefault();
                        moveTo(0, e.shiftKey ? -1 : 1);
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        moveTo(e.shiftKey ? -1 : 1, 0);
                    } else if (e.key === 'ArrowDown' && !e.shiftKey) {
                        moveTo(1, 0);
                    } else if (e.key === 'ArrowUp' && !e.shiftKey) {
                        moveTo(-1, 0);
                    } else if (e.key === 'ArrowRight' && window.getSelection().focusOffset >= td.textContent.length) {
                        moveTo(0, 1);
                    } else if (e.key === 'ArrowLeft' && window.getSelection().focusOffset === 0) {
                        moveTo(0, -1);
                    } else if (e.key === 'Escape') {
                        td.textContent = td.dataset.original;
                        td.blur();
                    }
                    // Shift+Arrow for range selection
                    if (e.shiftKey && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
                        e.preventDefault();
                        if (!rangeStart) rangeStart = { r, c };
                        if (!rangeEnd) rangeEnd = { r, c };
                        if (e.key === 'ArrowDown') rangeEnd.r++;
                        else if (e.key === 'ArrowUp') rangeEnd.r = Math.max(1, rangeEnd.r - 1);
                        else if (e.key === 'ArrowRight') rangeEnd.c++;
                        else if (e.key === 'ArrowLeft') rangeEnd.c = Math.max(0, rangeEnd.c - 1);
                        applyRangeSelection();
                    }
                });

                // Mouse range selection
                td.addEventListener('mousedown', (e) => {
                    if (e.button !== 0) return;
                    rangeStart = { r, c };
                    rangeEnd = { r, c };
                    isSelecting = true;
                    applyRangeSelection();
                });
                td.addEventListener('mouseover', () => {
                    if (!isSelecting) return;
                    rangeEnd = { r, c };
                    applyRangeSelection();
                });

                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        wrapper.appendChild(table);

        // Stop mouse range selection on mouseup
        document.addEventListener('mouseup', () => { isSelecting = false; });
    }

    workbook.sheets.forEach((sheet, i) => {
        const tab = document.createElement('div');
        tab.className = 'sheet-tab';
        tab.textContent = sheet.name || `Sheet ${i + 1}`;
        tab.onclick = () => showSheet(i);
        tabs.appendChild(tab);
    });

    container.appendChild(formulaBar);
    container.appendChild(wrapper);
    container.appendChild(tabs);
    if (workbook.sheets.length > 0) showSheet(0);
}

// === PPTX EDITABLE RENDERER ===
function renderEditablePptx(presentation) {
    const container = document.getElementById('pages-container');
    container.innerHTML = '';

    const layout = document.createElement('div');
    layout.className = 'pptx-layout';

    // Thumbnail panel
    const thumbPanel = document.createElement('div');
    thumbPanel.className = 'slide-thumbnails';

    // Main slide area
    const mainArea = document.createElement('div');
    mainArea.className = 'slide-main';

    const maxWidth = Math.min(900, window.innerWidth - 64 - 180);
    const scale = maxWidth / presentation.slide_width;
    const thumbScale = 120 / presentation.slide_width;

    // Build slide wrappers
    const slideWrappers = [];

    presentation.slides.forEach((slide, slideIdx) => {
        // Main editable slide
        const wrapper = document.createElement('div');
        wrapper.className = 'slide-wrapper';
        wrapper.dataset.slideIdx = slideIdx;
        wrapper.style.width = (presentation.slide_width * scale) + 'px';
        wrapper.style.height = (presentation.slide_height * scale) + 'px';
        wrapper.style.background = slide.background_color ? '#' + slide.background_color : 'white';
        wrapper.style.display = slideIdx === 0 ? '' : 'none';

        buildSlideContent(wrapper, slide, slideIdx, scale, true);
        slideWrappers.push(wrapper);
        mainArea.appendChild(wrapper);

        // Thumbnail
        const thumb = document.createElement('div');
        thumb.className = 'slide-thumb' + (slideIdx === 0 ? ' active' : '');
        const numEl = document.createElement('div');
        numEl.className = 'slide-thumb-num';
        numEl.textContent = slideIdx + 1;
        const preview = document.createElement('div');
        preview.className = 'slide-thumb-preview';
        preview.style.width = '120px';
        preview.style.height = (presentation.slide_height * thumbScale) + 'px';
        preview.style.position = 'relative';
        preview.style.overflow = 'hidden';
        preview.style.background = slide.background_color ? '#' + slide.background_color : 'white';

        buildSlideContent(preview, slide, slideIdx, thumbScale, false);

        thumb.appendChild(numEl);
        thumb.appendChild(preview);
        thumb.addEventListener('click', () => {
            thumbPanel.querySelectorAll('.slide-thumb').forEach(t => t.classList.remove('active'));
            thumb.classList.add('active');
            slideWrappers.forEach((w, i) => w.style.display = i === slideIdx ? '' : 'none');
            counter.textContent = `Slide ${slideIdx + 1} / ${presentation.slides.length}`;
        });
        thumbPanel.appendChild(thumb);
    });

    const counter = document.createElement('div');
    counter.className = 'slide-counter';
    counter.textContent = `Slide 1 / ${presentation.slides.length}`;
    mainArea.appendChild(counter);

    layout.appendChild(thumbPanel);
    layout.appendChild(mainArea);
    container.appendChild(layout);
}

function buildSlideContent(container, slide, slideIdx, scale, editable) {
    slide.shapes.forEach((shape, shapeIdx) => {
        const div = document.createElement('div');
        div.className = 'slide-shape';
        div.style.left = (shape.x * scale) + 'px';
        div.style.top = (shape.y * scale) + 'px';
        div.style.width = (shape.width * scale) + 'px';
        div.style.height = (shape.height * scale) + 'px';
        if (shape.fill_color) div.style.backgroundColor = '#' + shape.fill_color;
        if (shape.border_color) {
            const bw = shape.border_width || 1;
            div.style.border = (bw * scale) + 'px solid #' + shape.border_color;
            div.style.boxSizing = 'border-box';
        }

        const content = shape.content;
        if (content && content.TextBox) {
            content.TextBox.paragraphs.forEach((para, paraIdx) => {
                const p = document.createElement('p');
                const align = para.alignment;
                if (align === 'Center') p.style.textAlign = 'center';
                else if (align === 'Right') p.style.textAlign = 'right';
                else if (align === 'Justify') p.style.textAlign = 'justify';

                para.runs.forEach((run, runIdx) => {
                    const span = document.createElement('span');
                    span.textContent = run.text;
                    const fontSize = run.font_size || 18;
                    span.style.fontSize = (fontSize * scale) + 'px';
                    if (run.bold) span.style.fontWeight = 'bold';
                    if (run.italic) span.style.fontStyle = 'italic';
                    if (run.color) span.style.color = '#' + run.color;
                    if (run.font_family) span.style.fontFamily = run.font_family + ", 'Yu Gothic', 'Meiryo', 'Noto Sans JP', sans-serif";

                    if (editable) {
                        span.className = 'edit-slide-run';
                        span.contentEditable = 'true';
                        span.dataset.slide = slideIdx;
                        span.dataset.shape = shapeIdx;
                        span.dataset.para = paraIdx;
                        span.dataset.run = runIdx;
                        span.dataset.original = run.text;
                        span.style.outline = 'none';
                        span.style.borderBottom = '1px solid transparent';
                        span.addEventListener('focus', () => { span.style.borderBottomColor = '#4a6cf7'; });
                        span.addEventListener('blur', () => { span.style.borderBottomColor = 'transparent'; });
                        span.addEventListener('keydown', (e) => { if (e.key === 'Enter') e.preventDefault(); });
                    }
                    p.appendChild(span);
                });
                div.appendChild(p);
            });
        } else if (content && content.Image && content.Image.data && content.Image.data.length > 0) {
            const img = document.createElement('img');
            const bytes = content.Image.data;
            const ct = content.Image.content_type || 'image/png';
            let binary = '';
            for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
            img.src = `data:${ct};base64,${btoa(binary)}`;
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'contain';
            div.appendChild(img);
        }

        container.appendChild(div);
    });
}

// === FILE HANDLER ===
async function handleFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['docx', 'xlsx', 'pptx', 'pdf'].includes(ext)) {
        showStatus(t('unsupported'), 'error');
        return;
    }
    if (!wasmReady) {
        showStatus(t('wasmLoading'), 'info');
        return;
    }

    showStatus(t('parsing'), 'info');
    currentFileType = ext;
    btnDownload.textContent = `${t('download')} .${ext}`;

    toolbar.classList.add('visible');
    buildRibbon(ext);
    statusBar.classList.add('visible');
    statusBar.className = 'status-bar visible ' + ext;
    // Show Office-style title bar, hide landing header
    const titleBar = document.getElementById('titleBar');
    const landingHeader = document.getElementById('landingHeader');
    titleBar.style.display = 'flex';
    titleBar.className = 'title-bar ' + ext;
    document.getElementById('titleText').textContent = file.name + ' - Oxi';
    if (landingHeader) landingHeader.style.display = 'none';
    currentZoom = 100;
    applyZoom();
    document.querySelector('.container').classList.toggle('xlsx-active', ext === 'xlsx');

    try {
        const buffer = await file.arrayBuffer();
        currentFileBytes = buffer;
        const data = new Uint8Array(buffer);
        const t0 = performance.now();

        if (ext === 'docx') {
            currentDocIR = parse_document(data);
            const elapsed = (performance.now() - t0).toFixed(1);
            renderEditableDocx(currentDocIR);
            showStatus(I18N[currentLang].parsedDocx(elapsed), 'info');
        } else if (ext === 'xlsx') {
            currentDocIR = parse_spreadsheet(data);
            const elapsed = (performance.now() - t0).toFixed(1);
            let totalRows = 0;
            for (const s of currentDocIR.sheets) totalRows += s.rows.length;
            showStatus(I18N[currentLang].parsedXlsx(currentDocIR.sheets.length, totalRows, elapsed), 'info');
            renderEditableXlsx(currentDocIR);
        } else if (ext === 'pptx') {
            currentDocIR = parse_presentation(data);
            const elapsed = (performance.now() - t0).toFixed(1);
            let totalShapes = 0;
            for (const s of currentDocIR.slides) totalShapes += s.shapes.length;
            showStatus(I18N[currentLang].parsedPptx(currentDocIR.slides.length, totalShapes, elapsed), 'info');
            renderEditablePptx(currentDocIR);
        } else if (ext === 'pdf') {
            currentDocIR = parse_pdf(data);
            const elapsed = (performance.now() - t0).toFixed(1);
            showStatus(I18N[currentLang].parsedPdf(currentDocIR.pages.length, elapsed), 'info');
            renderPdfViewer(currentDocIR, data);
        }
    } catch(e) {
        showStatus('Error: ' + e.message, 'error');
        console.error(e);
    }
}

function renderPdfViewer(doc, rawData) {
    const viewer = document.getElementById('pages-container');
    viewer.innerHTML = '';

    // Document info panel
    const meta = document.createElement('div');
    meta.className = 'pdf-meta';
    const info = doc.info || {};
    meta.innerHTML = `
        <h3>📄 PDF Document</h3>
        <table>
            ${info.title ? `<tr><td><strong>Title</strong></td><td>${info.title}</td></tr>` : ''}
            ${info.author ? `<tr><td><strong>Author</strong></td><td>${info.author}</td></tr>` : ''}
            ${info.producer ? `<tr><td><strong>Producer</strong></td><td>${info.producer}</td></tr>` : ''}
            ${info.creator ? `<tr><td><strong>Creator</strong></td><td>${info.creator}</td></tr>` : ''}
            <tr><td><strong>Pages</strong></td><td>${doc.pages.length}</td></tr>
            <tr><td><strong>Version</strong></td><td>${doc.version ? `${doc.version.major}.${doc.version.minor}` : '?'}</td></tr>
        </table>
    `;
    viewer.appendChild(meta);

    // Signature panel
    try {
        const sigs = pdf_verify_signatures(rawData);
        const sigPanel = document.createElement('div');
        sigPanel.className = 'pdf-sig-panel';
        if (sigs && sigs.length > 0) {
            sigPanel.innerHTML = '<h3>' + I18N[currentLang].signatures + '</h3>' +
                sigs.map(s => `<div class="sig-entry">
                    <span class="sig-name">${s.signer_name || 'Unknown'}</span>
                    <span class="sig-status ${s.integrity_valid ? 'valid' : 'invalid'}">${s.integrity_valid ? '✓' : '✗'}</span>
                </div>`).join('');
        } else {
            sigPanel.innerHTML = '<h3>' + I18N[currentLang].signatures + '</h3><p>' + I18N[currentLang].noSignatures + '</p>';
        }
        viewer.appendChild(sigPanel);
    } catch(e) { console.warn('Signature check:', e); }

    // Hanko stamp generator
    const hankoPanel = document.createElement('div');
    hankoPanel.className = 'hanko-panel';
    hankoPanel.innerHTML = `
        <h3>Hanko Stamp Generator</h3>
        <div class="hanko-controls">
            <label>${I18N[currentLang].hankoName}: <input type="text" id="hankoName" value="山田" maxlength="8"></label>
            <label>${I18N[currentLang].hankoStyle}:
                <select id="hankoStyle">
                    <option value="Round">Round (丸印)</option>
                    <option value="Square">Square (角印)</option>
                    <option value="Oval">Oval (小判型)</option>
                </select>
            </label>
            <button id="hankoPreviewBtn">${I18N[currentLang].hankoPreview}</button>
        </div>
        <div class="hanko-preview" id="hankoPreviewArea"></div>
    `;
    viewer.appendChild(hankoPanel);

    // Hanko preview logic
    const updateHanko = () => {
        const name = document.getElementById('hankoName').value || '印';
        const svg = preview_hanko(name);
        document.getElementById('hankoPreviewArea').innerHTML = svg;
    };
    document.getElementById('hankoPreviewBtn').addEventListener('click', updateHanko);
    document.getElementById('hankoName').addEventListener('input', updateHanko);
    updateHanko();

    // Pages with text content
    doc.pages.forEach((page, i) => {
        const pageDiv = document.createElement('div');
        pageDiv.className = 'pdf-page';
        const header = document.createElement('div');
        header.className = 'pdf-page-header';
        header.textContent = `Page ${i + 1}`;
        pageDiv.appendChild(header);

        const content = document.createElement('div');
        content.style.whiteSpace = 'pre-wrap';
        content.style.fontFamily = 'monospace';
        content.style.fontSize = '13px';
        content.style.padding = '12px';

        const texts = (page.contents || [])
            .filter(c => c.Text)
            .map(c => c.Text.text)
            .join('\n');
        content.textContent = texts || '(no text content)';
        pageDiv.appendChild(content);
        viewer.appendChild(pageDiv);
    });
}

// Event handlers
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
});

initialize();

// === NEW DOCUMENT ===
function createNewDocument() {
    if (!wasmReady) {
        showStatus(t('wasmLoading'), 'info');
        return;
    }
    try {
        const bytes = create_blank_docx();
        currentFileBytes = bytes.buffer;
        currentFileType = 'docx';
        currentDocIR = parse_document(bytes);

        toolbar.classList.add('visible');
        btnDownload.textContent = `${t('download')} .docx`;
        buildRibbon('docx');
        statusBar.classList.add('visible');
        statusBar.className = 'status-bar visible docx';
        const titleBar = document.getElementById('titleBar');
        const landingHeader = document.getElementById('landingHeader');
        titleBar.style.display = 'flex';
        titleBar.className = 'title-bar docx';
        document.getElementById('titleText').textContent = 'Document1 - Oxi';
        if (landingHeader) landingHeader.style.display = 'none';
        currentZoom = 100;
        applyZoom();
        document.querySelector('.container').classList.remove('xlsx-active');

        renderEditableDocx(currentDocIR);
        showStatus('New document created', 'info');
    } catch(e) {
        showStatus('Error: ' + e.message, 'error');
        console.error(e);
    }
}

// === SAMPLE LOADER ===
async function loadSample(filename) {
    if (!wasmReady) {
        showStatus(t('wasmLoading'), 'info');
        return;
    }
    try {
        showStatus(t('loadingSample'), 'info');
        // Try relative paths for both docs/ and web/ deployments
        let resp = await fetch(filename);
        if (!resp.ok) resp = await fetch('./' + filename);
        if (!resp.ok) resp = await fetch('../tests/fixtures/' + filename.replace('sample', 'basic_test'));
        if (!resp.ok) throw new Error('Failed to fetch sample: ' + resp.status);
        const buffer = await resp.arrayBuffer();
        const blob = new Blob([buffer]);
        const file = new File([blob], filename);
        document.getElementById('sampleButtons').style.display = 'none';
        await handleFile(file);
    } catch(e) {
        showStatus('Error loading sample: ' + e.message, 'error');
        console.error(e);
    }
}

// Expose module functions to global scope for inline onclick handlers
window.createNewDocument = createNewDocument;
window.loadSample = loadSample;
window.downloadDocument = downloadEdited;
