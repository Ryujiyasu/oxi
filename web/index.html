<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f0f0;
    color: #333;
}
header {
    background: #1a1a2e;
    color: white;
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
}
header h1 { font-size: 20px; font-weight: 600; }
header span { font-size: 13px; opacity: 0.7; }
.container {
    max-width: 1100px;
    margin: 32px auto;
    padding: 0 16px;
}
.drop-zone {
    border: 2px dashed #aaa;
    border-radius: 12px;
    padding: 48px;
    text-align: center;
    background: white;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
}
.drop-zone:hover, .drop-zone.dragover {
    border-color: #4a6cf7;
    background: #f8f9ff;
}
.drop-zone p { font-size: 16px; color: #666; }
.drop-zone .hint { font-size: 13px; color: #999; margin-top: 8px; }
input[type="file"] { display: none; }
#status {
    margin-top: 16px;
    padding: 12px;
    border-radius: 8px;
    display: none;
    font-size: 14px;
}
#status.info { display: block; background: #e8f4ff; color: #1a73e8; }
#status.error { display: block; background: #ffeaea; color: #d93025; }
#pages-container {
    margin-top: 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
}
.page-wrapper {
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    display: inline-block;
}
canvas { display: block; }

/* Toolbar */
.toolbar {
    margin-top: 16px;
    display: none;
    gap: 8px;
    align-items: center;
}
.toolbar.visible { display: flex; }
.toolbar button {
    padding: 8px 16px;
    border: 1px solid #ccc;
    border-radius: 6px;
    background: white;
    cursor: pointer;
    font-size: 13px;
    transition: background 0.15s, border-color 0.15s;
}
.toolbar button:hover {
    background: #f0f0f0;
    border-color: #999;
}
.toolbar button.active {
    background: #1a1a2e;
    color: white;
    border-color: #1a1a2e;
}
.toolbar button.primary {
    background: #4a6cf7;
    color: white;
    border-color: #4a6cf7;
}
.toolbar button.primary:hover {
    background: #3a5ce7;
}

/* Editable document view */
.edit-page {
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    padding: 72px;
    max-width: 800px;
    width: 100%;
    min-height: 600px;
}
.edit-page .edit-para {
    margin-bottom: 4px;
    line-height: 1.5;
    min-height: 1.2em;
}
.edit-page .edit-para.heading1 {
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 12px;
}
.edit-page .edit-para.heading2 {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 10px;
}
.edit-page .edit-para.heading3 {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 8px;
}
.edit-page .edit-para.align-center { text-align: center; }
.edit-page .edit-para.align-right { text-align: right; }
.edit-page .edit-para.align-justify { text-align: justify; }
.edit-page .edit-run {
    outline: none;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
    cursor: text;
}
.edit-page .edit-run:focus {
    border-bottom-color: #4a6cf7;
}
.edit-page .edit-table {
    border-collapse: collapse;
    margin: 12px 0;
    width: 100%;
}
.edit-page .edit-table td {
    border: 1px solid #ccc;
    padding: 6px 8px;
    min-width: 60px;
}
.edit-page .edit-table .edit-run {
    display: inline;
}

/* Spreadsheet styles */
.sheet-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 0;
    padding: 0 4px;
}
.sheet-tab {
    padding: 8px 16px;
    background: #e8e8e8;
    border: 1px solid #ccc;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    cursor: pointer;
    font-size: 13px;
    color: #555;
}
.sheet-tab.active {
    background: white;
    color: #1a73e8;
    font-weight: 600;
}
.spreadsheet-wrapper {
    background: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    border-radius: 0 8px 8px 8px;
    overflow-x: auto;
    max-width: 100%;
}
.spreadsheet-wrapper table {
    border-collapse: collapse;
    font-size: 13px;
    font-family: 'Calibri', 'Segoe UI', sans-serif;
}
.spreadsheet-wrapper th {
    background: #f3f3f3;
    border: 1px solid #d0d0d0;
    padding: 4px 8px;
    font-weight: 600;
    color: #555;
    min-width: 30px;
    position: sticky;
    top: 0;
    z-index: 1;
}
.spreadsheet-wrapper th.row-header {
    position: sticky;
    left: 0;
    z-index: 2;
    min-width: 40px;
    text-align: center;
}
.spreadsheet-wrapper td {
    border: 1px solid #e0e0e0;
    padding: 4px 8px;
    min-width: 80px;
    max-width: 250px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.spreadsheet-wrapper td[contenteditable="true"]:focus {
    outline: 2px solid #4a6cf7;
    outline-offset: -1px;
    background: #f8f9ff;
}

/* Slide styles */
.slide-wrapper {
    background: white;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    position: relative;
    overflow: hidden;
}
.slide-shape {
    position: absolute;
    overflow: hidden;
}
.slide-shape p {
    margin: 0;
}
.slide-counter {
    text-align: center;
    font-size: 13px;
    color: #888;
    margin-top: 4px;
}
</style>
</head>
<body>

<header>
    <img src="../docs/icon-64.png" alt="Oxi" height="28" style="border-radius:4px">
    <h1>Oxi</h1>
    <span>Document viewer &amp; editor — .docx / .xlsx / .pptx (Rust + Wasm)</span>
</header>

<div class="container">
    <div class="drop-zone" id="dropZone">
        <p>Drop a .docx, .xlsx, or .pptx file here — or click to browse</p>
        <p class="hint">Parsed, rendered, and edited entirely in your browser via WebAssembly</p>
    </div>
    <input type="file" id="fileInput" accept=".docx,.xlsx,.pptx">
    <div class="toolbar" id="toolbar">
        <button id="btnView" class="active">View</button>
        <button id="btnEdit">Edit</button>
        <button id="btnDownload" class="primary" style="display:none">Download</button>
    </div>
    <div id="status"></div>
    <div id="pages-container"></div>
</div>

<script type="module">
import init, { layout_document, parse_document, parse_spreadsheet, parse_presentation, edit_docx, edit_xlsx, edit_pptx } from '../crates/oxi-wasm/pkg/oxi_wasm.js';

let wasmReady = false;
let currentMode = 'view'; // 'view' or 'edit'
let currentFileType = null; // 'docx', 'xlsx', or 'pptx'
let currentFileBytes = null; // original file bytes for editing
let currentDocIR = null; // parsed IR for edit mode

const HIGHLIGHT_COLORS = {
    yellow: '#FFFF00', green: '#00FF00', cyan: '#00FFFF', magenta: '#FF00FF',
    blue: '#0000FF', red: '#FF0000', darkBlue: '#000080', darkCyan: '#008080',
    darkGreen: '#008000', darkMagenta: '#800080', darkRed: '#800000',
    darkYellow: '#808000', darkGray: '#808080', lightGray: '#C0C0C0',
    black: '#000000', white: '#FFFFFF',
};

async function initialize() {
    try {
        await init();
        wasmReady = true;
        console.log('Wasm initialized');
    } catch(e) {
        showStatus('Failed to load Wasm: ' + e.message, 'error');
    }
}

function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.textContent = msg;
    el.className = type;
}

// === TOOLBAR ===
const toolbar = document.getElementById('toolbar');
const btnView = document.getElementById('btnView');
const btnEdit = document.getElementById('btnEdit');
const btnDownload = document.getElementById('btnDownload');

btnView.addEventListener('click', () => switchMode('view'));
btnEdit.addEventListener('click', () => switchMode('edit'));
btnDownload.addEventListener('click', downloadEdited);

function switchMode(mode) {
    if (mode === currentMode) return;
    currentMode = mode;
    btnView.classList.toggle('active', mode === 'view');
    btnEdit.classList.toggle('active', mode === 'edit');
    btnDownload.style.display = mode === 'edit' ? '' : 'none';
    if (mode === 'edit' && currentFileType) {
        const ext = currentFileType;
        btnDownload.textContent = `Download .${ext}`;
    }

    if (!currentFileBytes) return;
    const data = new Uint8Array(currentFileBytes);

    if (mode === 'view') {
        showStatus('Rendering...', 'info');
        try {
            if (currentFileType === 'docx') {
                const result = layout_document(data);
                renderDocx(result);
            } else if (currentFileType === 'xlsx') {
                renderXlsx(currentDocIR);
            } else if (currentFileType === 'pptx') {
                renderPptx(currentDocIR);
            }
            showStatus('View mode', 'info');
        } catch(e) {
            showStatus('Error: ' + e.message, 'error');
        }
    } else if (mode === 'edit' && currentDocIR) {
        if (currentFileType === 'docx') {
            renderEditableDocx(currentDocIR);
        } else if (currentFileType === 'xlsx') {
            renderEditableXlsx(currentDocIR);
        } else if (currentFileType === 'pptx') {
            renderEditablePptx(currentDocIR);
        }
        showStatus('Edit mode — click on text to edit, then download', 'info');
    }
}

function collectDocxEdits() {
    const edits = [];
    const runs = document.querySelectorAll('.edit-run[data-para][data-run]');
    for (const el of runs) {
        const paraIdx = parseInt(el.dataset.para);
        const runIdx = parseInt(el.dataset.run);
        const originalText = el.dataset.original;
        const currentText = el.textContent;
        if (currentText !== originalText) {
            edits.push({ paragraph_index: paraIdx, run_index: runIdx, new_text: currentText });
        }
    }
    return edits;
}

function collectXlsxEdits() {
    const edits = [];
    const cells = document.querySelectorAll('.edit-cell[data-sheet][data-row][data-col]');
    for (const el of cells) {
        const sheetIdx = parseInt(el.dataset.sheet);
        const row = parseInt(el.dataset.row);
        const col = parseInt(el.dataset.col);
        const original = el.dataset.original;
        const current = el.textContent;
        if (current !== original) {
            edits.push({ sheet_index: sheetIdx, row, col, new_value: current });
        }
    }
    return edits;
}

function collectPptxEdits() {
    const edits = [];
    const runs = document.querySelectorAll('.edit-slide-run[data-slide][data-shape][data-para][data-run]');
    for (const el of runs) {
        const slideIdx = parseInt(el.dataset.slide);
        const shapeIdx = parseInt(el.dataset.shape);
        const paraIdx = parseInt(el.dataset.para);
        const runIdx = parseInt(el.dataset.run);
        const original = el.dataset.original;
        const current = el.textContent;
        if (current !== original) {
            edits.push({ slide_index: slideIdx, shape_index: shapeIdx, paragraph_index: paraIdx, run_index: runIdx, new_text: current });
        }
    }
    return edits;
}

const MIME_TYPES = {
    docx: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
    xlsx: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
    pptx: 'application/vnd.openxmlformats-officedocument.presentationml.presentation',
};

function downloadEdited() {
    if (!currentFileBytes || !currentFileType) return;

    let edits;
    if (currentFileType === 'docx') edits = collectDocxEdits();
    else if (currentFileType === 'xlsx') edits = collectXlsxEdits();
    else if (currentFileType === 'pptx') edits = collectPptxEdits();
    else return;

    if (edits.length === 0) {
        showStatus('No changes to save', 'info');
        return;
    }

    try {
        const data = new Uint8Array(currentFileBytes);
        let editedBytes;
        if (currentFileType === 'docx') editedBytes = edit_docx(data, edits);
        else if (currentFileType === 'xlsx') editedBytes = edit_xlsx(data, edits);
        else if (currentFileType === 'pptx') editedBytes = edit_pptx(data, edits);

        const blob = new Blob([editedBytes], { type: MIME_TYPES[currentFileType] });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `edited.${currentFileType}`;
        a.click();
        URL.revokeObjectURL(url);
        showStatus(`Downloaded with ${edits.length} edit(s)`, 'info');
    } catch(e) {
        showStatus('Save error: ' + e.message, 'error');
        console.error(e);
    }
}

// === IMAGE CACHE (for docx) ===
const imageCache = new Map();
function loadImage(dataUrl) {
    if (imageCache.has(dataUrl)) return Promise.resolve(imageCache.get(dataUrl));
    return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => { imageCache.set(dataUrl, img); resolve(img); };
        img.onerror = () => resolve(null);
        img.src = dataUrl;
    });
}

// === DOCX RENDERER (canvas — view mode) ===
async function renderDocx(layoutResult) {
    const container = document.getElementById('pages-container');
    container.innerHTML = '';

    const scale = window.devicePixelRatio || 1;
    const displayScale = Math.min(1, (window.innerWidth - 64) / layoutResult.pages[0].width);

    const imagePromises = [];
    for (const page of layoutResult.pages) {
        for (const elem of page.elements) {
            if (elem.kind === 'image' && elem.image_data) {
                const ct = elem.content_type || 'image/png';
                imagePromises.push(loadImage(`data:${ct};base64,${elem.image_data}`));
            }
        }
    }
    await Promise.all(imagePromises);

    for (const page of layoutResult.pages) {
        const wrapper = document.createElement('div');
        wrapper.className = 'page-wrapper';
        const canvas = document.createElement('canvas');
        canvas.width = page.width * scale;
        canvas.height = page.height * scale;
        canvas.style.width = (page.width * displayScale) + 'px';
        canvas.style.height = (page.height * displayScale) + 'px';
        const ctx = canvas.getContext('2d');
        ctx.scale(scale, scale);
        ctx.fillStyle = 'white';
        ctx.fillRect(0, 0, page.width, page.height);

        for (const elem of page.elements) {
            if (elem.kind === 'text') {
                const fontSize = elem.font_size || 11;
                let fontStyle = '';
                if (elem.italic) fontStyle += 'italic ';
                if (elem.bold) fontStyle += 'bold ';
                ctx.font = fontStyle + fontSize + 'px Calibri, "Yu Gothic", "Noto Sans JP", sans-serif';
                if (elem.highlight) {
                    ctx.fillStyle = HIGHLIGHT_COLORS[elem.highlight] || elem.highlight;
                    ctx.fillRect(elem.x, elem.y, elem.width, elem.height);
                }
                ctx.fillStyle = elem.color ? '#' + elem.color : '#000';
                const baseline = elem.y + fontSize * 0.82;
                ctx.fillText(elem.text, elem.x, baseline);
                if (elem.underline) {
                    ctx.strokeStyle = elem.color ? '#' + elem.color : '#000';
                    ctx.lineWidth = Math.max(0.5, fontSize * 0.05);
                    ctx.beginPath();
                    ctx.moveTo(elem.x, baseline + fontSize * 0.12);
                    ctx.lineTo(elem.x + elem.width, baseline + fontSize * 0.12);
                    ctx.stroke();
                }
                if (elem.strikethrough) {
                    ctx.strokeStyle = elem.color ? '#' + elem.color : '#000';
                    ctx.lineWidth = Math.max(0.5, fontSize * 0.05);
                    ctx.beginPath();
                    const sy = elem.y + elem.height * 0.45;
                    ctx.moveTo(elem.x, sy);
                    ctx.lineTo(elem.x + elem.width, sy);
                    ctx.stroke();
                }
            } else if (elem.kind === 'border') {
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(elem.x1, elem.y1);
                ctx.lineTo(elem.x2, elem.y2);
                ctx.stroke();
            } else if (elem.kind === 'image') {
                if (elem.image_data) {
                    const ct = elem.content_type || 'image/png';
                    const img = imageCache.get(`data:${ct};base64,${elem.image_data}`);
                    if (img) ctx.drawImage(img, elem.x, elem.y, elem.width, elem.height);
                    else drawImagePlaceholder(ctx, elem);
                } else {
                    drawImagePlaceholder(ctx, elem);
                }
            }
        }
        wrapper.appendChild(canvas);
        container.appendChild(wrapper);
    }
}

function drawImagePlaceholder(ctx, elem) {
    ctx.fillStyle = '#f5f5f5';
    ctx.fillRect(elem.x, elem.y, elem.width, elem.height);
    ctx.strokeStyle = '#ddd';
    ctx.strokeRect(elem.x, elem.y, elem.width, elem.height);
    ctx.fillStyle = '#bbb';
    ctx.font = '10px sans-serif';
    ctx.fillText('[image]', elem.x + 4, elem.y + 14);
}

// === DOCX EDITABLE RENDERER (DOM — edit mode) ===
function renderEditableDocx(doc) {
    const container = document.getElementById('pages-container');
    container.innerHTML = '';

    // We only track body-level paragraphs (not inside tables) for editing
    let bodyParaIdx = 0;

    for (const page of doc.pages) {
        const pageDiv = document.createElement('div');
        pageDiv.className = 'edit-page';

        for (const block of page.blocks) {
            if (block.Paragraph) {
                const para = block.Paragraph;
                const paraDiv = document.createElement('div');
                paraDiv.className = 'edit-para';

                // Heading level
                if (para.style && para.style.heading_level) {
                    paraDiv.classList.add('heading' + para.style.heading_level);
                }

                // Alignment
                const align = para.alignment;
                if (align === 'Center') paraDiv.classList.add('align-center');
                else if (align === 'Right') paraDiv.classList.add('align-right');
                else if (align === 'Justify') paraDiv.classList.add('align-justify');

                // Indentation
                if (para.style && para.style.indent_left) {
                    paraDiv.style.paddingLeft = para.style.indent_left + 'pt';
                }

                // List marker
                if (para.style && para.style.list_marker) {
                    const markerSpan = document.createElement('span');
                    markerSpan.className = 'edit-list-marker';
                    markerSpan.textContent = para.style.list_marker;
                    markerSpan.contentEditable = 'false';
                    markerSpan.style.display = 'inline-block';
                    markerSpan.style.userSelect = 'none';
                    const listIndent = para.style.list_indent || 18;
                    markerSpan.style.width = listIndent + 'pt';
                    markerSpan.style.marginLeft = '-' + listIndent + 'pt';
                    markerSpan.style.textAlign = 'left';
                    paraDiv.appendChild(markerSpan);
                }

                for (let ri = 0; ri < para.runs.length; ri++) {
                    const run = para.runs[ri];
                    const span = document.createElement('span');
                    span.className = 'edit-run';
                    span.contentEditable = 'true';
                    span.textContent = run.text;
                    span.dataset.para = bodyParaIdx;
                    span.dataset.run = ri;
                    span.dataset.original = run.text;

                    // Preserve visual styling
                    if (run.style) {
                        if (run.style.bold) span.style.fontWeight = 'bold';
                        if (run.style.italic) span.style.fontStyle = 'italic';
                        if (run.style.underline) span.style.textDecoration = 'underline';
                        if (run.style.strikethrough) {
                            span.style.textDecoration = span.style.textDecoration
                                ? span.style.textDecoration + ' line-through'
                                : 'line-through';
                        }
                        if (run.style.color) span.style.color = '#' + run.style.color;
                        if (run.style.font_size) span.style.fontSize = run.style.font_size + 'pt';
                        if (run.style.font_family) span.style.fontFamily = run.style.font_family + ', sans-serif';
                        if (run.style.highlight) {
                            span.style.backgroundColor = HIGHLIGHT_COLORS[run.style.highlight] || run.style.highlight;
                        }
                    }

                    // Prevent Enter from creating new DOM nodes inside span
                    span.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter') e.preventDefault();
                    });

                    paraDiv.appendChild(span);
                }

                // Empty paragraph — show placeholder
                if (para.runs.length === 0) {
                    const span = document.createElement('span');
                    span.className = 'edit-run';
                    span.innerHTML = '&nbsp;';
                    paraDiv.appendChild(span);
                }

                pageDiv.appendChild(paraDiv);
                bodyParaIdx++;

            } else if (block.Table) {
                const table = block.Table;
                const tableEl = document.createElement('table');
                tableEl.className = 'edit-table';

                for (const row of table.rows) {
                    const tr = document.createElement('tr');
                    for (const cell of row.cells) {
                        const td = document.createElement('td');
                        // Table cells contain blocks — render text but not editable (for now)
                        for (const cellBlock of cell.blocks) {
                            if (cellBlock.Paragraph) {
                                for (const run of cellBlock.Paragraph.runs) {
                                    const span = document.createElement('span');
                                    span.textContent = run.text;
                                    if (run.style && run.style.bold) span.style.fontWeight = 'bold';
                                    if (run.style && run.style.italic) span.style.fontStyle = 'italic';
                                    td.appendChild(span);
                                }
                            }
                        }
                        tr.appendChild(td);
                    }
                    tableEl.appendChild(tr);
                }
                pageDiv.appendChild(tableEl);
                // Tables don't increment bodyParaIdx (they are separate blocks)

            } else if (block.Image) {
                const img = block.Image;
                if (img.data && img.data.length > 0) {
                    const imgEl = document.createElement('img');
                    const ct = img.content_type || 'image/png';
                    let binary = '';
                    for (let i = 0; i < img.data.length; i++) binary += String.fromCharCode(img.data[i]);
                    imgEl.src = `data:${ct};base64,${btoa(binary)}`;
                    imgEl.style.maxWidth = '100%';
                    imgEl.style.height = 'auto';
                    imgEl.style.margin = '8px 0';
                    pageDiv.appendChild(imgEl);
                }
            }
        }

        container.appendChild(pageDiv);
    }
}

// === XLSX RENDERER ===
function colName(idx) {
    let name = '';
    let n = idx;
    while (n >= 0) {
        name = String.fromCharCode(65 + (n % 26)) + name;
        n = Math.floor(n / 26) - 1;
    }
    return name;
}

// Number formatting helper
function formatCellValue(val, style) {
    let raw = '';
    let isNumber = false;
    if (typeof val === 'object' && val !== null) {
        if ('String' in val) raw = val.String;
        else if ('Number' in val) { raw = val.Number; isNumber = true; }
        else if ('Boolean' in val) return val.Boolean ? 'TRUE' : 'FALSE';
        else if ('Error' in val) return val.Error;
        else if ('Empty' in val) return '';
    } else if (typeof val === 'string') {
        return val;
    }
    if (!isNumber) return String(raw);

    const fmt = style && style.number_format;
    if (!fmt || fmt === 'General') {
        if (raw === Math.floor(raw)) return String(Math.floor(raw));
        return String(raw);
    }

    // Date formats (Excel serial number to date)
    if (fmt.includes('yy') || (fmt.includes('mm') && fmt.includes('dd'))) {
        const base = new Date(1899, 11, 30);
        const d = new Date(base.getTime() + raw * 86400000);
        const mm = String(d.getMonth() + 1).padStart(2, '0');
        const dd = String(d.getDate()).padStart(2, '0');
        const yy = String(d.getFullYear()).slice(-2);
        const yyyy = String(d.getFullYear());
        if (fmt.includes('h:mm') || fmt.includes('H:mm')) {
            const hh = String(d.getHours());
            const mi = String(d.getMinutes()).padStart(2, '0');
            return `${d.getMonth()+1}/${d.getDate()}/${yy} ${hh}:${mi}`;
        }
        if (fmt.includes('yyyy')) return `${yyyy}-${mm}-${dd}`;
        return `${mm}-${dd}-${yy}`;
    }

    // Percentage
    if (fmt.includes('%')) {
        const pct = raw * 100;
        if (fmt.includes('.00')) return pct.toFixed(2) + '%';
        return Math.round(pct) + '%';
    }

    // Scientific
    if (fmt.includes('E+')) {
        return raw.toExponential(2).toUpperCase();
    }

    // Decimal fixed (0.00 or #,##0.00)
    if (fmt === '0.00' || fmt.includes('#,##0.00')) {
        const fixed = raw.toFixed(2);
        if (fmt.includes(',')) {
            return Number(fixed).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }
        return fixed;
    }

    // Comma thousands (#,##0)
    if (fmt === '#,##0' || fmt.includes(',')) {
        return Math.round(raw).toLocaleString('en-US');
    }

    // Fixed integer (0)
    if (fmt === '0') return String(Math.round(raw));

    // Fallback
    if (raw === Math.floor(raw)) return String(Math.floor(raw));
    return String(raw);
}

// Build merge coverage info
function buildMergeInfo(mergeCells) {
    const covered = new Set();
    const origins = new Map();
    if (!mergeCells) return { covered, origins };
    for (const mc of mergeCells) {
        const rowspan = mc.end_row - mc.start_row + 1;
        const colspan = mc.end_col - mc.start_col + 1;
        origins.set(`${mc.start_row},${mc.start_col}`, { rowspan, colspan });
        for (let r = mc.start_row; r <= mc.end_row; r++) {
            for (let c = mc.start_col; c <= mc.end_col; c++) {
                if (r !== mc.start_row || c !== mc.start_col) {
                    covered.add(`${r},${c}`);
                }
            }
        }
    }
    return { covered, origins };
}

function getColWidthPx(sheet, colIdx) {
    const charWidth = 7;
    if (sheet.col_widths && colIdx < sheet.col_widths.length) {
        return Math.round(sheet.col_widths[colIdx] * charWidth);
    }
    return Math.round((sheet.default_col_width || 8.43) * charWidth);
}

function getRowHeightPx(row, defaultRowHeight) {
    if (row && row.height != null) return Math.round(row.height * 1.333);
    return Math.round((defaultRowHeight || 15) * 1.333);
}

function cellStyleStr(cell) {
    let style = '';
    if (cell && cell.style) {
        const s = cell.style;
        if (s.bold) style += 'font-weight:bold;';
        if (s.italic) style += 'font-style:italic;';
        if (s.font_color) style += `color:#${s.font_color};`;
        if (s.bg_color) style += `background:#${s.bg_color};`;
        if (s.horizontal_align) style += `text-align:${s.horizontal_align};`;
        if (s.border_top) style += 'border-top:1px solid #333;';
        if (s.border_bottom) style += 'border-bottom:1px solid #333;';
        if (s.border_left) style += 'border-left:1px solid #333;';
        if (s.border_right) style += 'border-right:1px solid #333;';
        if (s.font_size) style += `font-size:${s.font_size}pt;`;
    }
    // Numbers default right-align
    if (cell && cell.value && typeof cell.value === 'object' && 'Number' in cell.value) {
        if (!cell.style || !cell.style.horizontal_align) {
            style += 'text-align:right;';
        }
    }
    return style;
}

function renderXlsx(workbook) {
    const container = document.getElementById('pages-container');
    container.innerHTML = '';

    const tabs = document.createElement('div');
    tabs.className = 'sheet-tabs';

    const wrapper = document.createElement('div');
    wrapper.className = 'spreadsheet-wrapper';

    function showSheet(idx) {
        for (const t of tabs.children) t.classList.remove('active');
        tabs.children[idx].classList.add('active');

        const sheet = workbook.sheets[idx];
        const colCount = sheet.col_count || 1;
        const { covered, origins } = buildMergeInfo(sheet.merge_cells);

        const rowMap = {};
        let maxRow = 0;
        for (const row of sheet.rows) {
            rowMap[row.index] = row;
            if (row.index > maxRow) maxRow = row.index;
        }
        if (maxRow < 20) maxRow = 20;

        let html = '<table><colgroup><col style="width:40px">';
        for (let c = 0; c < colCount; c++) {
            html += `<col style="width:${getColWidthPx(sheet, c)}px">`;
        }
        html += '</colgroup><thead><tr><th class="row-header"></th>';
        for (let c = 0; c < colCount; c++) {
            html += `<th>${colName(c)}</th>`;
        }
        html += '</tr></thead><tbody>';

        for (let r = 1; r <= maxRow; r++) {
            const row = rowMap[r];
            const rowH = getRowHeightPx(row, sheet.default_row_height);
            html += `<tr style="height:${rowH}px"><th class="row-header">${r}</th>`;

            const cellMap = {};
            if (row) {
                for (const cell of row.cells) cellMap[cell.col] = cell;
            }

            for (let c = 0; c < colCount; c++) {
                const key = `${r},${c}`;
                if (covered.has(key)) continue;

                const cell = cellMap[c];
                const merge = origins.get(key);
                let attrs = '';
                if (merge) {
                    if (merge.rowspan > 1) attrs += ` rowspan="${merge.rowspan}"`;
                    if (merge.colspan > 1) attrs += ` colspan="${merge.colspan}"`;
                }

                const style = cellStyleStr(cell);
                const display = cell ? formatCellValue(cell.value, cell.style) : '';
                html += `<td${attrs}${style ? ` style="${style}"` : ''}>${escapeHtml(display)}</td>`;
            }
            html += '</tr>';
        }
        html += '</tbody></table>';
        wrapper.innerHTML = html;
    }

    workbook.sheets.forEach((sheet, i) => {
        const tab = document.createElement('div');
        tab.className = 'sheet-tab';
        tab.textContent = sheet.name || `Sheet ${i + 1}`;
        tab.onclick = () => showSheet(i);
        tabs.appendChild(tab);
    });

    container.appendChild(tabs);
    container.appendChild(wrapper);
    if (workbook.sheets.length > 0) showSheet(0);
}

function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// === XLSX EDITABLE RENDERER ===
function renderEditableXlsx(workbook) {
    const container = document.getElementById('pages-container');
    container.innerHTML = '';

    const tabs = document.createElement('div');
    tabs.className = 'sheet-tabs';

    const wrapper = document.createElement('div');
    wrapper.className = 'spreadsheet-wrapper';

    function showSheet(idx) {
        for (const t of tabs.children) t.classList.remove('active');
        tabs.children[idx].classList.add('active');

        const sheet = workbook.sheets[idx];
        const colCount = sheet.col_count || 1;
        const { covered, origins } = buildMergeInfo(sheet.merge_cells);

        const rowMap = {};
        let maxRow = 0;
        for (const row of sheet.rows) {
            rowMap[row.index] = row;
            if (row.index > maxRow) maxRow = row.index;
        }
        if (maxRow < 20) maxRow = 20;

        wrapper.innerHTML = '';
        const table = document.createElement('table');

        // Colgroup for column widths
        const colgroup = document.createElement('colgroup');
        const rowHeaderCol = document.createElement('col');
        rowHeaderCol.style.width = '40px';
        colgroup.appendChild(rowHeaderCol);
        for (let c = 0; c < colCount; c++) {
            const col = document.createElement('col');
            col.style.width = getColWidthPx(sheet, c) + 'px';
            colgroup.appendChild(col);
        }
        table.appendChild(colgroup);

        const thead = document.createElement('thead');
        const headerRow = document.createElement('tr');
        headerRow.innerHTML = '<th class="row-header"></th>';
        for (let c = 0; c < colCount; c++) {
            const th = document.createElement('th');
            th.textContent = colName(c);
            headerRow.appendChild(th);
        }
        thead.appendChild(headerRow);
        table.appendChild(thead);

        const tbody = document.createElement('tbody');
        for (let r = 1; r <= maxRow; r++) {
            const row = rowMap[r];
            const tr = document.createElement('tr');
            const rowH = getRowHeightPx(row, sheet.default_row_height);
            tr.style.height = rowH + 'px';

            const th = document.createElement('th');
            th.className = 'row-header';
            th.textContent = r;
            tr.appendChild(th);

            const cellMap = {};
            if (row) {
                for (const cell of row.cells) cellMap[cell.col] = cell;
            }

            for (let c = 0; c < colCount; c++) {
                const key = `${r},${c}`;
                if (covered.has(key)) continue;

                const td = document.createElement('td');
                td.contentEditable = 'true';
                td.className = 'edit-cell';
                td.dataset.sheet = idx;
                td.dataset.row = r;
                td.dataset.col = c;

                const merge = origins.get(key);
                if (merge) {
                    if (merge.rowspan > 1) td.rowSpan = merge.rowspan;
                    if (merge.colspan > 1) td.colSpan = merge.colspan;
                }

                const cell = cellMap[c];
                let display = '';
                if (cell) {
                    display = formatCellValue(cell.value, cell.style);
                    if (cell.style) {
                        if (cell.style.bold) td.style.fontWeight = 'bold';
                        if (cell.style.italic) td.style.fontStyle = 'italic';
                        if (cell.style.font_color) td.style.color = '#' + cell.style.font_color;
                        if (cell.style.bg_color) td.style.background = '#' + cell.style.bg_color;
                        if (cell.style.horizontal_align) td.style.textAlign = cell.style.horizontal_align;
                        if (cell.style.border_top) td.style.borderTop = '1px solid #333';
                        if (cell.style.border_bottom) td.style.borderBottom = '1px solid #333';
                        if (cell.style.border_left) td.style.borderLeft = '1px solid #333';
                        if (cell.style.border_right) td.style.borderRight = '1px solid #333';
                        if (cell.style.font_size) td.style.fontSize = cell.style.font_size + 'pt';
                    }
                    // Numbers default right-align
                    if (cell.value && typeof cell.value === 'object' && 'Number' in cell.value) {
                        if (!cell.style || !cell.style.horizontal_align) {
                            td.style.textAlign = 'right';
                        }
                    }
                }
                td.textContent = display;
                td.dataset.original = display;

                td.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') e.preventDefault();
                });

                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        }
        table.appendChild(tbody);
        wrapper.appendChild(table);
    }

    workbook.sheets.forEach((sheet, i) => {
        const tab = document.createElement('div');
        tab.className = 'sheet-tab';
        tab.textContent = sheet.name || `Sheet ${i + 1}`;
        tab.onclick = () => showSheet(i);
        tabs.appendChild(tab);
    });

    container.appendChild(tabs);
    container.appendChild(wrapper);
    if (workbook.sheets.length > 0) showSheet(0);
}

// === PPTX EDITABLE RENDERER ===
function renderEditablePptx(presentation) {
    const container = document.getElementById('pages-container');
    container.innerHTML = '';

    const maxWidth = Math.min(900, window.innerWidth - 64);
    const scale = maxWidth / presentation.slide_width;

    presentation.slides.forEach((slide, slideIdx) => {
        const outerWrapper = document.createElement('div');
        const wrapper = document.createElement('div');
        wrapper.className = 'slide-wrapper';
        wrapper.style.width = (presentation.slide_width * scale) + 'px';
        wrapper.style.height = (presentation.slide_height * scale) + 'px';
        wrapper.style.background = slide.background_color ? '#' + slide.background_color : 'white';

        slide.shapes.forEach((shape, shapeIdx) => {
            const div = document.createElement('div');
            div.className = 'slide-shape';
            div.style.left = (shape.x * scale) + 'px';
            div.style.top = (shape.y * scale) + 'px';
            div.style.width = (shape.width * scale) + 'px';
            div.style.height = (shape.height * scale) + 'px';
            if (shape.fill_color) {
                div.style.backgroundColor = '#' + shape.fill_color;
            }
            if (shape.border_color) {
                const bw = shape.border_width || 1;
                div.style.border = (bw * scale) + 'px solid #' + shape.border_color;
                div.style.boxSizing = 'border-box';
            }

            const content = shape.content;
            if (content && content.TextBox) {
                content.TextBox.paragraphs.forEach((para, paraIdx) => {
                    const p = document.createElement('p');
                    const align = para.alignment;
                    if (align === 'Center') p.style.textAlign = 'center';
                    else if (align === 'Right') p.style.textAlign = 'right';
                    else if (align === 'Justify') p.style.textAlign = 'justify';

                    para.runs.forEach((run, runIdx) => {
                        const span = document.createElement('span');
                        span.className = 'edit-slide-run';
                        span.contentEditable = 'true';
                        span.textContent = run.text;
                        span.dataset.slide = slideIdx;
                        span.dataset.shape = shapeIdx;
                        span.dataset.para = paraIdx;
                        span.dataset.run = runIdx;
                        span.dataset.original = run.text;

                        const fontSize = run.font_size || 18;
                        span.style.fontSize = (fontSize * scale) + 'px';
                        if (run.bold) span.style.fontWeight = 'bold';
                        if (run.italic) span.style.fontStyle = 'italic';
                        if (run.color) span.style.color = '#' + run.color;
                        if (run.font_family) span.style.fontFamily = run.font_family + ', sans-serif';
                        span.style.outline = 'none';
                        span.style.borderBottom = '1px solid transparent';
                        span.addEventListener('focus', () => { span.style.borderBottomColor = '#4a6cf7'; });
                        span.addEventListener('blur', () => { span.style.borderBottomColor = 'transparent'; });
                        span.addEventListener('keydown', (e) => { if (e.key === 'Enter') e.preventDefault(); });

                        p.appendChild(span);
                    });
                    div.appendChild(p);
                });
            } else if (content && content.Image && content.Image.data && content.Image.data.length > 0) {
                const img = document.createElement('img');
                const bytes = content.Image.data;
                const ct = content.Image.content_type || 'image/png';
                let binary = '';
                for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                img.src = `data:${ct};base64,${btoa(binary)}`;
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.objectFit = 'contain';
                div.appendChild(img);
            }

            wrapper.appendChild(div);
        });

        outerWrapper.appendChild(wrapper);
        const counter = document.createElement('div');
        counter.className = 'slide-counter';
        counter.textContent = `Slide ${slide.index}`;
        outerWrapper.appendChild(counter);
        container.appendChild(outerWrapper);
    });
}

// === FILE HANDLER ===
async function handleFile(file) {
    const ext = file.name.split('.').pop().toLowerCase();
    if (!['docx', 'xlsx', 'pptx'].includes(ext)) {
        showStatus('Supported formats: .docx, .xlsx, .pptx', 'error');
        return;
    }
    if (!wasmReady) {
        showStatus('Wasm is still loading...', 'info');
        return;
    }

    showStatus('Parsing and rendering...', 'info');
    currentMode = 'view';
    currentFileType = ext;
    btnView.classList.add('active');
    btnEdit.classList.remove('active');
    btnDownload.style.display = 'none';
    btnDownload.textContent = `Download .${ext}`;

    toolbar.classList.add('visible');

    try {
        const buffer = await file.arrayBuffer();
        currentFileBytes = buffer;
        const data = new Uint8Array(buffer);
        const t0 = performance.now();

        if (ext === 'docx') {
            currentDocIR = parse_document(data);
            const result = layout_document(data);
            const elapsed = (performance.now() - t0).toFixed(1);
            let totalElements = 0;
            for (const p of result.pages) totalElements += p.elements.length;
            showStatus(`Rendered ${result.pages.length} page(s), ${totalElements} elements in ${elapsed}ms`, 'info');
            await renderDocx(result);
        } else if (ext === 'xlsx') {
            currentDocIR = parse_spreadsheet(data);
            const elapsed = (performance.now() - t0).toFixed(1);
            let totalRows = 0;
            for (const s of currentDocIR.sheets) totalRows += s.rows.length;
            showStatus(`Parsed ${currentDocIR.sheets.length} sheet(s), ${totalRows} rows in ${elapsed}ms`, 'info');
            renderXlsx(currentDocIR);
        } else if (ext === 'pptx') {
            currentDocIR = parse_presentation(data);
            const elapsed = (performance.now() - t0).toFixed(1);
            let totalShapes = 0;
            for (const s of currentDocIR.slides) totalShapes += s.shapes.length;
            showStatus(`Parsed ${currentDocIR.slides.length} slide(s), ${totalShapes} shapes in ${elapsed}ms`, 'info');
            renderPptx(currentDocIR);
        }
    } catch(e) {
        showStatus('Error: ' + e.message, 'error');
        console.error(e);
    }
}

// Event handlers
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
});
