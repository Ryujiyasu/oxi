<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oxidocs</title>
<style>
:root {
  --accent: #185ABD;
  --accent-h: #1048A0;
  --accent-l: #E6EEF9;
  --rib: #F3F3F3;
  --rib-b: #D6D6D6;
  --txt: #333;
  --bg: #E8E8E8;
  --shad: 0 1px 4px rgba(0,0,0,.18);
  --hover: #E0E0E0;
  --grp: #D0D0D0;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);display:flex;flex-direction:column}

/* Title bar */
.tb{display:flex;align-items:center;height:32px;background:var(--accent);color:#fff;padding:0 12px;font-size:12px;user-select:none;flex-shrink:0}
.tb .logo{font-weight:700;margin-right:10px;letter-spacing:.5px}
.tb .qat{display:flex;gap:2px;margin-right:14px}
.tb .qat button svg,.tb .ra button svg{width:16px;height:16px;vertical-align:middle}
.tb .qat button,.tb .ra button{background:none;border:none;color:rgba(255,255,255,.9);cursor:pointer;padding:3px 7px;border-radius:3px;font-size:13px}
.tb .qat button:hover,.tb .ra button:hover{background:rgba(255,255,255,.18)}
.tb .dn{flex:1;text-align:center;opacity:.95}
.tb .ra{display:flex;gap:4px}

/* Ribbon tabs */
.rtabs{display:flex;align-items:flex-end;background:var(--accent);padding:0 8px;flex-shrink:0;height:26px}
.rtabs button{background:none;border:none;color:#fff;font:inherit;font-size:13px;padding:5px 14px;cursor:pointer;border-radius:4px 4px 0 0}
.rtabs button:hover{color:#fff;background:rgba(255,255,255,.1)}
.rtabs button.active{background:var(--rib);color:var(--txt);font-weight:500}

/* Ribbon panel */
.rib{background:var(--rib);border-bottom:1px solid var(--rib-b);padding:4px 10px 5px;display:flex;gap:2px;align-items:stretch;flex-shrink:0;min-height:82px}
.rg{display:flex;flex-direction:column;border-right:1px solid var(--grp);padding:0 8px}
.rg:last-child{border-right:none}
.rg-l{font-size:9px;color:#888;text-align:center;margin-top:auto;padding-top:2px;user-select:none}
.rr{display:flex;gap:1px;align-items:center}
.rc{display:flex;flex-direction:column;gap:1px}

/* Buttons */
.rb{background:none;border:1px solid transparent;cursor:pointer;padding:3px 5px;border-radius:3px;color:var(--txt);display:inline-flex;align-items:center;justify-content:center;min-width:24px;min-height:24px;font:inherit;font-size:13px;line-height:1}
.rb:hover{background:var(--hover);border-color:#C0C0C0}
.rb.active{background:#D0D8E8;border-color:#9DB2D6}
.rb svg{width:16px;height:16px;pointer-events:none}
.rb.lg{padding:4px 10px;font-size:12px;gap:4px}
.font-sel,.size-sel{font:inherit;font-size:12px;padding:1px 4px;border:1px solid #C0C0C0;border-radius:2px;height:24px;background:#fff;cursor:pointer;color:#333}
.font-sel{width:130px}
.size-sel{width:46px;text-align:center}
/* Color */
.cb{position:relative;display:inline-flex;flex-direction:column;align-items:center;background:none;border:1px solid transparent;cursor:pointer;padding:2px 5px;border-radius:3px;font-size:14px;min-width:28px;min-height:24px;font-weight:700;color:var(--txt)}
.cb:hover{background:var(--hover);border-color:#C0C0C0}
.cb .bar{height:3px;width:16px;border-radius:1px}
.cpop{display:none;position:absolute;top:100%;left:0;z-index:200;background:#fff;border:1px solid #ccc;border-radius:4px;padding:8px;box-shadow:0 4px 12px rgba(0,0,0,.2);gap:2px;flex-wrap:wrap;width:160px}
.cpop.show{display:flex}
.cpop .sw{width:16px;height:16px;border:1px solid #ddd;border-radius:2px;cursor:pointer;padding:0}
.cpop .sw:hover{border-color:#333;transform:scale(1.15)}
/* Table grid */
.tgp{display:none;position:absolute;top:100%;left:0;z-index:200;background:#fff;border:1px solid #ccc;border-radius:4px;padding:10px;box-shadow:0 4px 12px rgba(0,0,0,.2)}
.mbar .tgp{top:auto;bottom:100%;left:50%;transform:translateX(-50%);margin-bottom:8px}
.tgp.show{display:block}
.tgp .lbl{font-size:11px;color:#666;margin-bottom:6px;text-align:center}
.tg{display:grid;grid-template-columns:repeat(8,18px);gap:2px}
.tg .tc{width:18px;height:18px;border:1px solid #ccc;background:#fff;cursor:pointer;padding:0;border-radius:1px}
.tg .tc.hl{background:var(--accent-l);border-color:var(--accent)}

/* Canvas document area */
.canvas-area{flex:1;overflow:auto;display:flex;flex-direction:column;align-items:center;padding:20px 0 60px;background:#888}
.canvas-area .page-canvas{display:block;margin:10px auto;box-shadow:0 2px 8px rgba(0,0,0,.3);background:#fff}
.canvas-area .empty-state{color:#ccc;font-size:18px;margin-top:120px;text-align:center;user-select:none}
.canvas-area .loading-state{color:#fff;font-size:14px;padding:20px}

/* Status bar */
.sb{display:flex;align-items:center;height:22px;background:var(--accent);color:#fff;padding:0 14px;font-size:11px;flex-shrink:0;gap:16px}
.sb .sep{opacity:.3}
.sb .zg{margin-left:auto;display:flex;align-items:center;gap:6px}
.sb input[type="range"]{width:90px;accent-color:#fff;height:4px}

/* Mobile bottom bar */
.mbar{display:none;flex-shrink:0;background:var(--rib);border-top:1px solid var(--rib-b);padding:4px 0 env(safe-area-inset-bottom,4px);overflow-x:auto;-webkit-overflow-scrolling:touch}
.mbar-row{display:flex;gap:2px;padding:0 8px;min-width:max-content;align-items:center}
.mbar .rb{min-width:36px;min-height:36px;font-size:15px}
.mbar .rb svg{width:20px;height:20px}
.mbar .sep{width:1px;height:28px;background:var(--grp);margin:0 4px;flex-shrink:0}

/* Dialog */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;z-index:100;align-items:center;justify-content:center}
.ov.show{display:flex}
.dlg{background:#fff;border-radius:8px;padding:28px 32px;min-width:320px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.dlg h2{font-size:16px;margin-bottom:12px;color:var(--accent)}
.dlg .acts{display:flex;gap:10px;margin-top:18px}
.dlg button{padding:7px 22px;border:none;border-radius:4px;cursor:pointer;font:inherit;font-size:13px;font-weight:500}
.dlg .bp{background:var(--accent);color:#fff}
.dlg .bp:hover{background:var(--accent-h)}
.dlg .bs{background:#E0E0E0;color:#333}
.dlg .bs:hover{background:#D0D0D0}
input[type="file"]{display:none}

/* Responsive */
@media(max-width:768px){
  .rtabs,.rib{display:none!important}
  .mbar{display:block}
  .tb{height:44px;padding:0 8px}
  .tb .qat button,.tb .ra button{padding:6px 8px;font-size:14px}
  .tb .logo{font-size:14px}
  .sb{height:28px;font-size:12px}
}
@media(min-width:769px){
  .mbar{display:none!important}
}
</style>
</head>

function detectLang() {
  const stored = localStorage.getItem('oxi-lang');
  if (stored && I18N[stored]) return stored;
  const nav = navigator.language || 'en';
  if (nav.startsWith('ja')) return 'ja';
  if (nav.startsWith('ko')) return 'ko';
  if (nav.startsWith('zh-TW') || nav.startsWith('zh-Hant')) return 'zh-Hant';
  if (nav.startsWith('zh')) return 'zh-Hans';
  if (nav.startsWith('de')) return 'de';
  if (nav.startsWith('fr')) return 'fr';
  if (nav.startsWith('es')) return 'es';
  if (nav.startsWith('it')) return 'it';
  if (nav.startsWith('pt')) return 'pt';
  return 'en';
}
let curLang = detectLang();
function t(key) { return (I18N[curLang] || I18N.en)[key] || I18N.en[key] || key; }

function applyI18n() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-title]').forEach(el => {
    el.title = t(el.dataset.i18nTitle);
  });
}

// ---- WASM ----
import init, { layout_document, edit_docx_advanced, build_docx, parse_document, edit_text_and_relayout } from './oxi_wasm.js';
await init();

// Tauri headless render mode
if (window.__TAURI__) {
  try {
    const [docxPath, outputDir, dpi] = await window.__TAURI__.core.invoke('get_render_args');
    if (docxPath && outputDir) {
      // Read docx via Tauri command
      const base64Data = await window.__TAURI__.core.invoke('read_file_base64', { path: docxPath });
      const binary = atob(base64Data);
      const bytes = new Uint8Array(binary.length);
      for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
      const layout = layout_document(bytes);
      const scale = dpi / 72;
      for (let pi = 0; pi < layout.pages.length; pi++) {
        const pg = layout.pages[pi];
        // Inline render since renderPage isn't defined yet at this point
        const w = Math.ceil(pg.width * scale);
        const h = Math.ceil(pg.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, w, h);
        ctx.scale(scale, scale);
        for (const el of pg.elements) {
          const kind = el.kind || '';
          if (kind === 'text') {
            const fs = el.font_size || 11;
            const fam = el.font_family || 'Calibri, sans-serif';
            ctx.font = `${el.italic?'italic ':''}${el.bold?'bold ':''}${fs}px ${fam}`;
            ctx.fillStyle = el.color || '#000000';
            if (el.character_spacing) ctx.letterSpacing = `${el.character_spacing}px`;
            ctx.fillText(el.text || '', el.x, el.y + fs * 0.85);
            if (el.character_spacing) ctx.letterSpacing = '0px';
          } else if (kind === 'shading') {
            const r = el.corner_radius || 0;
            if (el.color) { ctx.fillStyle = el.color; if (r>0){ctx.beginPath();ctx.roundRect(el.x,el.y,el.width,el.height,r);ctx.fill();}else ctx.fillRect(el.x,el.y,el.width,el.height); }
            if (el.stroke_color) { ctx.strokeStyle = el.stroke_color; ctx.lineWidth = el.stroke_width||1; if(r>0){ctx.beginPath();ctx.roundRect(el.x,el.y,el.width,el.height,r);ctx.stroke();}else ctx.strokeRect(el.x,el.y,el.width,el.height); }
          } else if (kind === 'border' || kind === 'rect') {
            ctx.beginPath(); ctx.strokeStyle = el.color||'#000000'; ctx.lineWidth = el.width||0.5;
            if(el.x1!=null){ctx.moveTo(el.x1,el.y1);ctx.lineTo(el.x2,el.y2);}else{ctx.moveTo(el.x,el.y);ctx.lineTo(el.x+el.width,el.y+el.height);}ctx.stroke();
          } else if (kind === 'image' && el.image_data) {
            try { const img=new Image(); img.src=`data:${el.content_type||'image/png'};base64,${el.image_data}`; await new Promise(r=>{img.onload=r;setTimeout(r,2000);}); ctx.drawImage(img,el.x,el.y,el.width,el.height); } catch{}
          } else if (kind === 'clip_start') { ctx.save();ctx.beginPath();ctx.rect(el.x,el.y,el.width,el.height);ctx.clip(); }
          else if (kind === 'clip_end') { ctx.restore(); }
        }
        const dataUrl = canvas.toDataURL('image/png');
        const base64 = dataUrl.replace(/^data:image\/png;base64,/, '');
        const pageNum = String(pi + 1).padStart(4, '0');
        await window.__TAURI__.core.invoke('save_png', {
          path: `${outputDir}\\page_${pageNum}.png`,
          dataBase64: base64,
        });
      }
      document.title = `Done: ${layout.pages.length} pages`;
    }
  } catch (e) {
    // Not in render mode or error, continue normally
    console.log('Render mode:', e);
  }
}

// ---- Image preloading ----
async function preloadImages(elements) {
  const imageMap = new Map();
  const promises = [];
  elements.forEach((elem, idx) => {
    if (elem.kind === 'image' && elem.image_data) {
      const ct = elem.content_type || 'image/png';
      const img = new Image();
      const p = new Promise(resolve => {
        img.onload = () => { imageMap.set(idx, img); resolve(); };
        img.onerror = () => resolve();
      });
      img.src = `data:${ct};base64,${elem.image_data}`;
      promises.push(p);
    }
  });
  await Promise.all(promises);
  return imageMap;
}

// ---- Canvas rendering ----
function renderText(ctx, elem) {
  const fontSize = elem.font_size || 11;
  const family = elem.font_family || 'Calibri, sans-serif';
  const bold = elem.bold ? 'bold ' : '';
  const italic = elem.italic ? 'italic ' : '';

  ctx.font = `${italic}${bold}${fontSize}px ${family}`;
  ctx.fillStyle = elem.color || '#000000';

  // Highlight
  if (elem.highlight && elem.highlight !== 'none') {
    ctx.save();
    ctx.fillStyle = elem.highlight;
    ctx.fillRect(elem.x, elem.y, elem.width, elem.height);
    ctx.restore();
    ctx.fillStyle = elem.color || '#000000';
  }

  // Character spacing
  if (elem.character_spacing && elem.character_spacing !== 0) {
    ctx.letterSpacing = `${elem.character_spacing}px`;
  }

  const baseline = elem.y + fontSize * 0.85;
  ctx.fillText(elem.text || '', elem.x, baseline);

  if (elem.character_spacing && elem.character_spacing !== 0) {
    ctx.letterSpacing = '0px';
  }

  // Underline
  if (elem.underline) {
    ctx.beginPath();
    ctx.strokeStyle = elem.color || '#000000';
    ctx.lineWidth = fontSize * 0.05;
    const underY = baseline + fontSize * 0.15;
    ctx.moveTo(elem.x, underY);
    ctx.lineTo(elem.x + elem.width, underY);
    ctx.stroke();
  }

  // Strikethrough
  if (elem.strikethrough) {
    ctx.beginPath();
    ctx.strokeStyle = elem.color || '#000000';
    ctx.lineWidth = fontSize * 0.05;
    const strikeY = elem.y + elem.height * 0.45;
    ctx.moveTo(elem.x, strikeY);
    ctx.lineTo(elem.x + elem.width, strikeY);
    ctx.stroke();
  }
}

function renderImage(ctx, elem, loadedImg) {
  if (!loadedImg) {
    ctx.fillStyle = '#f0f0f0';
    ctx.fillRect(elem.x, elem.y, elem.width, elem.height);
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(elem.x, elem.y, elem.width, elem.height);
    return;
  }
  ctx.drawImage(loadedImg, elem.x, elem.y, elem.width, elem.height);
}

function renderBorder(ctx, elem) {
  ctx.beginPath();
  ctx.strokeStyle = elem.color || '#000000';
  ctx.lineWidth = elem.width || 0.5;
  if (elem.x1 != null) {
    ctx.moveTo(elem.x1, elem.y1);
    ctx.lineTo(elem.x2, elem.y2);
  } else {
    ctx.moveTo(elem.x, elem.y);
    ctx.lineTo(elem.x + elem.width, elem.y + elem.height);
  }
  ctx.stroke();
}

function renderShading(ctx, elem) {
  const x = elem.x, y = elem.y, w = elem.width, h = elem.height;
  const r = elem.corner_radius || 0;

  // Fill
  if (elem.color) {
    ctx.fillStyle = elem.color;
    if (r > 0) {
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.fill();
    } else {
      ctx.fillRect(x, y, w, h);
    }
  }

  // Stroke
  if (elem.stroke_color) {
    ctx.strokeStyle = elem.stroke_color;
    ctx.lineWidth = elem.stroke_width || 1;
    if (r > 0) {
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.stroke();
    } else {
      ctx.strokeRect(x, y, w, h);
    }
  }
}

function renderRect(ctx, elem) {
  const x = elem.x, y = elem.y, w = elem.width, h = elem.height;
  const r = elem.corner_radius || 0;

  // Fill
  if (elem.fill || elem.color) {
    ctx.fillStyle = elem.fill || elem.color;
    if (r > 0) {
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.fill();
    } else {
      ctx.fillRect(x, y, w, h);
    }
  }

  // Stroke
  if (elem.stroke || elem.border_color) {
    ctx.strokeStyle = elem.stroke || elem.border_color;
    ctx.lineWidth = elem.border_width || 1;
    if (r > 0) {
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
      ctx.stroke();
    } else {
      ctx.strokeRect(x, y, w, h);
    }
  }
}

function renderPresetShape(ctx, elem) {
  // Render preset shapes same as rect for now
  renderRect(ctx, elem);
}

async function renderPage(page, index, scale) {
  const canvas = document.createElement('canvas');
  canvas.className = 'page-canvas';
  canvas.id = `page-${index}`;
  canvas.width = Math.round(page.width * scale);
  canvas.height = Math.round(page.height * scale);

  const isMobile = window.innerWidth < 769;
  if (isMobile) {
    canvas.style.width = '100%';
    canvas.style.height = 'auto';
  } else {
    canvas.style.width = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';
  }

  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const imageMap = await preloadImages(page.elements);

  ctx.save();
  ctx.scale(scale, scale);

  for (let idx = 0; idx < page.elements.length; idx++) {
    const elem = page.elements[idx];
    if (elem.kind === 'text') {
      renderText(ctx, elem);
    } else if (elem.kind === 'image') {
      renderImage(ctx, elem, imageMap.get(idx));
    } else if (elem.kind === 'border') {
      renderBorder(ctx, elem);
    } else if (elem.kind === 'shading') {
      renderShading(ctx, elem);
    } else if (elem.kind === 'rect') {
      renderRect(ctx, elem);
    } else if (elem.kind === 'preset_shape') {
      renderPresetShape(ctx, elem);
    } else if (elem.kind === 'clip_start') {
      ctx.save();
      ctx.beginPath();
      ctx.rect(elem.x, elem.y, elem.width, elem.height);
      ctx.clip();
    } else if (elem.kind === 'clip_end') {
      ctx.restore();
    }
  }

  ctx.restore();
  return canvas;
}

// ---- Document rendering ----
async function renderDocument(docxBytes) {
  // Remove empty state
  emptyState.style.display = 'none';

  // Clear previous canvases
  canvasArea.querySelectorAll('.page-canvas,.loading-state').forEach(el => el.remove());

  const loadingEl = document.createElement('div');
  loadingEl.className = 'loading-state';
  loadingEl.textContent = t('rendering');
  canvasArea.appendChild(loadingEl);

  const start = performance.now();

  try {
    const result = layout_document(docxBytes);
    layoutResult = result;
    const layoutMs = Math.round(performance.now() - start);

    if (!result || !result.pages || result.pages.length === 0) {
      loadingEl.textContent = `No pages in layout result (${layoutMs}ms)`;
      return;
    }

    loadingEl.remove();

    const isMobile = window.innerWidth < 769;
    const scale = isMobile
      ? (window.innerWidth - 20) / (result.pages[0]?.width || 595)
      : SCALE_BASE * (zoomLevel / 100);
    currentScale = scale;

    for (let i = 0; i < result.pages.length; i++) {
      const canvas = await renderPage(result.pages[i], i, scale);
      canvas.addEventListener('mousedown', e => onCanvasClick(e, i));
      canvasArea.appendChild(canvas);
    }

    const totalMs = Math.round(performance.now() - start);
    $('pgInfo').textContent = `${result.pages.length} ${t('pages')}`;
    $('statusText').textContent = `Layout ${layoutMs}ms, total ${totalMs}ms`;

    // Expose for automation
    window.__oxiRenderDone = true;
    window.__oxiLayoutMs = layoutMs;
    window.__oxiTotalMs = totalMs;
    window.__oxiPageCount = result.pages.length;
  } catch (e) {
    loadingEl.textContent = `Error: ${e.message}`;
    console.error(e);
  }
}

// ---- Hit testing & cursor ----
function onCanvasClick(e, pageIndex) {
  if (!layoutResult) return;
  const canvas = e.target;
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (canvas.width / rect.width) / currentScale;
  const y = (e.clientY - rect.top) * (canvas.height / rect.height) / currentScale;

  const page = layoutResult.pages[pageIndex];
  if (!page) return;

  // Find closest text element
  let bestElem = null, bestIdx = -1, bestDist = Infinity;
  for (let i = 0; i < page.elements.length; i++) {
    const el = page.elements[i];
    if (el.kind !== 'text' || !el.text) continue;
    // Check if click is within element's vertical band (with some tolerance)
    const ey = el.y, eh = el.height || el.font_size || 11;
    if (y >= ey - 2 && y <= ey + eh + 2) {
      // Horizontal distance
      const ex = el.x, ew = el.width || 0;
      const dx = x < ex ? ex - x : x > ex + ew ? x - ex - ew : 0;
      const dy = Math.abs(y - (ey + eh / 2));
      const dist = dx + dy * 0.1; // prefer same-line matches
      if (dist < bestDist) {
        bestDist = dist;
        bestElem = el;
        bestIdx = i;
      }
    }
  }

  // If no same-line match, find globally nearest
  if (!bestElem) {
    for (let i = 0; i < page.elements.length; i++) {
      const el = page.elements[i];
      if (el.kind !== 'text' || !el.text) continue;
      const eh = el.height || el.font_size || 11;
      const cy = el.y + eh / 2, cx = el.x + (el.width || 0) / 2;
      const dist = Math.abs(cx - x) + Math.abs(cy - y) * 2;
      if (dist < bestDist) { bestDist = dist; bestElem = el; bestIdx = i; }
    }
  }

  if (!bestElem) return;

  // Find character offset within the text element
  const charOffset = getCharOffset(bestElem, x);

  cursorPos = { pageIndex, elemIndex: bestIdx, charOffset };
  drawCursor();
  startCursorBlink();
  e.preventDefault();
  hiddenInput.focus();
}

function getCharOffset(elem, clickX) {
  const offscreen = document.createElement('canvas').getContext('2d');
  const fs = elem.font_size || 11;
  const fam = elem.font_family || 'Calibri, sans-serif';
  offscreen.font = `${elem.italic?'italic ':''}${elem.bold?'bold ':''}${fs}px ${fam}`;
  const text = elem.text || '';
  const relX = clickX - elem.x;
  for (let i = 0; i <= text.length; i++) {
    const w = offscreen.measureText(text.substring(0, i)).width;
    if (w >= relX) return Math.max(0, i);
  }
  return text.length;
}

function getCursorXY() {
  if (!cursorPos || !layoutResult) return null;
  const page = layoutResult.pages[cursorPos.pageIndex];
  if (!page) return null;
  const el = page.elements[cursorPos.elemIndex];
  if (!el) return null;

  const offscreen = document.createElement('canvas').getContext('2d');
  const fs = el.font_size || 11;
  const fam = el.font_family || 'Calibri, sans-serif';
  offscreen.font = `${el.italic?'italic ':''}${el.bold?'bold ':''}${fs}px ${fam}`;
  const textBefore = (el.text || '').substring(0, cursorPos.charOffset);
  const cx = el.x + offscreen.measureText(textBefore).width;
  const cy = el.y;
  const ch = el.height || fs;
  return { x: cx, y: cy, h: ch, pageIndex: cursorPos.pageIndex };
}

let cursorOverlay = null;

function drawCursor() {
  // Remove old overlay
  if (cursorOverlay) { cursorOverlay.remove(); cursorOverlay = null; }

  if (!cursorPos) return;
  const pos = getCursorXY();
  if (!pos) return;

  const pageCanvas = $(`page-${pos.pageIndex}`);
  if (!pageCanvas) return;

  const overlay = document.createElement('canvas');
  overlay.className = 'cursor-overlay';
  overlay.width = pageCanvas.width;
  overlay.height = pageCanvas.height;
  overlay.style.cssText = `position:absolute;left:${pageCanvas.offsetLeft}px;top:${pageCanvas.offsetTop}px;width:${pageCanvas.style.width};height:${pageCanvas.style.height};pointer-events:none;`;

  const ctx = overlay.getContext('2d');
  ctx.scale(currentScale, currentScale);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(pos.x, pos.y);
  ctx.lineTo(pos.x, pos.y + pos.h);
  ctx.stroke();

  pageCanvas.parentElement.style.position = 'relative';
  pageCanvas.insertAdjacentElement('afterend', overlay);
  cursorOverlay = overlay;
}

function startCursorBlink() {
  if (cursorBlinkTimer) clearInterval(cursorBlinkTimer);
  cursorVisible = true;
  drawCursor();
  if (cursorOverlay) cursorOverlay.style.visibility = 'visible';
  cursorBlinkTimer = setInterval(() => {
    cursorVisible = !cursorVisible;
    if (cursorOverlay) cursorOverlay.style.visibility = cursorVisible ? 'visible' : 'hidden';
  }, 530);
}

function stopCursorBlink() {
  if (cursorBlinkTimer) { clearInterval(cursorBlinkTimer); cursorBlinkTimer = null; }
  cursorVisible = false;
  if (cursorOverlay) { cursorOverlay.remove(); cursorOverlay = null; }
}

// ---- Text input handling ----
hiddenInput.addEventListener('input', e => {
  if (!cursorPos || !currentDocx || !layoutResult) return;
  const typed = hiddenInput.value;
  if (!typed) return;
  hiddenInput.value = '';
  insertText(typed);
});

hiddenInput.addEventListener('compositionend', e => {
  if (!cursorPos || !currentDocx) return;
  const text = e.data;
  hiddenInput.value = '';
  if (text) insertText(text);
});

// Fallback: handle printable characters via keypress/keydown for browsers
// where hidden textarea doesn't fire 'input' events
hiddenInput.addEventListener('keypress', e => {
  if (!cursorPos || !currentDocx || !layoutResult) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const ch = e.key;
  if (ch && ch.length === 1) {
    e.preventDefault();
    insertText(ch);
  }
});

function getRunText(paraIndex, runIndex) {
  // Document structure: { pages: [{ blocks: [{"Paragraph": {...}} | {"Table": {...}} | ...] }] }
  // paragraph_index = flat block index (not paragraph-only count)
  const docStruct = parse_document(currentDocx);
  for (const page of (docStruct.pages || [])) {
    const blocks = page.blocks || [];
    if (paraIndex < blocks.length) {
      const block = blocks[paraIndex];
      // serde tagged enum: { "Paragraph": { runs: [...] } }
      const para = block.Paragraph || block;
      const run = para.runs?.[runIndex];
      if (run) return run.text || '';
    }
  }
  return null;
}

let renderTimer = null;
let pendingCursorRestore = null;

let pendingEdit = null; // { paraIndex, runIndex, newText }

function editDocxNow(paraIndex, runIndex, newText) {
  // Queue the edit for batch relayout
  pendingEdit = { paraIndex, runIndex, newText };
  // Also update docx bytes (needed for save)
  const edits = [{ type: 'set_run_text', paragraph_index: paraIndex, run_index: runIndex, new_text: newText }];
  const edited = edit_docx_advanced(currentDocx, edits);
  currentDocx = new Uint8Array(edited);
}

function scheduleRender() {
  if (renderTimer) clearTimeout(renderTimer);
  renderTimer = setTimeout(async () => {
    renderTimer = null;
    const start = performance.now();
    let result;
    try {
      if (pendingEdit) {
        // Fast path: use cached Document, skip parse
        result = edit_text_and_relayout(pendingEdit.paraIndex, pendingEdit.runIndex, pendingEdit.newText);
        pendingEdit = null;
      } else {
        result = layout_document(currentDocx);
      }
    } catch (e) {
      // Fallback to full re-parse
      result = layout_document(currentDocx);
      pendingEdit = null;
    }
    layoutResult = result;
    const layoutMs = Math.round(performance.now() - start);

    // Remove cursor overlay only
    if (cursorOverlay) { cursorOverlay.remove(); cursorOverlay = null; }

    const isMobile = window.innerWidth < 769;
    const scale = isMobile
      ? (window.innerWidth - 20) / (result.pages[0]?.width || 595)
      : SCALE_BASE * (zoomLevel / 100);
    currentScale = scale;

    // Reuse existing canvases, add/remove as needed
    const existingCanvases = canvasArea.querySelectorAll('.page-canvas');
    for (let i = 0; i < result.pages.length; i++) {
      const page = result.pages[i];
      let canvas = existingCanvases[i];
      const w = Math.round(page.width * scale);
      const h = Math.round(page.height * scale);
      if (!canvas) {
        canvas = document.createElement('canvas');
        canvas.className = 'page-canvas';
        canvas.addEventListener('mousedown', e => onCanvasClick(e, i));
        canvasArea.appendChild(canvas);
      }
      canvas.id = `page-${i}`;
      canvas.width = w;
      canvas.height = h;
      if (isMobile) { canvas.style.width = '100%'; canvas.style.height = 'auto'; }
      else { canvas.style.width = w + 'px'; canvas.style.height = h + 'px'; }
      // Redraw in place
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(0, 0, w, h);
      ctx.save();
      ctx.scale(scale, scale);
      for (const elem of page.elements) {
        if (elem.kind === 'text') renderText(ctx, elem);
        else if (elem.kind === 'border') renderBorder(ctx, elem);
        else if (elem.kind === 'shading') renderShading(ctx, elem);
        else if (elem.kind === 'rect') renderRect(ctx, elem);
        else if (elem.kind === 'preset_shape') renderPresetShape(ctx, elem);
        else if (elem.kind === 'clip_start') { ctx.save(); ctx.beginPath(); ctx.rect(elem.x, elem.y, elem.width, elem.height); ctx.clip(); }
        else if (elem.kind === 'clip_end') ctx.restore();
        else if (elem.kind === 'image' && elem.image_data) {
          const img = new Image();
          const ct = elem.content_type || 'image/png';
          img.src = `data:${ct};base64,${elem.image_data}`;
          const ex = elem.x, ey = elem.y, ew = elem.width, eh = elem.height;
          img.onload = () => { ctx.drawImage(img, ex, ey, ew, eh); };
        }
      }
      ctx.restore();
    }
    // Remove extra canvases if page count decreased
    for (let i = result.pages.length; i < existingCanvases.length; i++) {
      existingCanvases[i].remove();
    }
    $('pgInfo').textContent = `${result.pages.length} ${t('pages')}`;
    $('statusText').textContent = `Layout ${layoutMs}ms`;

    if (pendingCursorRestore) {
      const { paraIndex, runIndex, charOff } = pendingCursorRestore;
      restoreCursor(paraIndex, runIndex, charOff);
      pendingCursorRestore = null;
    }
  }, 0);
}

async function insertText(text) {
  if (!cursorPos || !layoutResult) return;
  const page = layoutResult.pages[cursorPos.pageIndex];
  const el = page.elements[cursorPos.elemIndex];
  if (!el || el.paragraph_index == null || el.run_index == null) return;

  const globalCharOffset = (el.char_offset || 0) + cursorPos.charOffset;

  try {
    const oldText = getRunText(el.paragraph_index, el.run_index);
    if (oldText == null) return;

    const newText = oldText.substring(0, globalCharOffset) + text + oldText.substring(globalCharOffset);
    editDocxNow(el.paragraph_index, el.run_index, newText);

    // Optimistic: update layoutResult in-place and redraw just this page
    const fragOld = el.text || '';
    const localOff = cursorPos.charOffset;
    el.text = fragOld.substring(0, localOff) + text + fragOld.substring(localOff);
    const oldWidth = el.width;
    el.width = measureTextWidth(el);
    const dx = el.width - oldWidth;

    // Shift subsequent elements on the same line
    if (dx !== 0) shiftFollowing(page, cursorPos.elemIndex, el.y, dx);

    cursorPos.charOffset += text.length;
    pendingCursorRestore = { paraIndex: el.paragraph_index, runIndex: el.run_index, charOff: globalCharOffset + text.length };

    // Instant redraw of just this page
    repaintPage(cursorPos.pageIndex);
    drawCursor();

    // Full re-layout later
    scheduleRender();
  } catch (err) {
    console.error('Edit failed:', err);
  }
}

function shiftFollowing(page, elemIndex, lineY, dx) {
  // Shift all elements after elemIndex that are on the same line (same y)
  for (let i = elemIndex + 1; i < page.elements.length; i++) {
    const e = page.elements[i];
    if (Math.abs(e.y - lineY) < 1) {
      e.x += dx;
    }
  }
}

function measureTextWidth(el) {
  const ctx = document.createElement('canvas').getContext('2d');
  const fs = el.font_size || 11;
  const fam = el.font_family || 'Calibri, sans-serif';
  ctx.font = `${el.italic?'italic ':''}${el.bold?'bold ':''}${fs}px ${fam}`;
  return ctx.measureText(el.text || '').width;
}

function repaintPage(pageIndex) {
  if (!layoutResult) return;
  const page = layoutResult.pages[pageIndex];
  if (!page) return;
  const canvas = $(`page-${pageIndex}`);
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.scale(currentScale, currentScale);
  for (const elem of page.elements) {
    if (elem.kind === 'text') renderText(ctx, elem);
    else if (elem.kind === 'border') renderBorder(ctx, elem);
    else if (elem.kind === 'shading') renderShading(ctx, elem);
    else if (elem.kind === 'rect') renderRect(ctx, elem);
    else if (elem.kind === 'preset_shape') renderPresetShape(ctx, elem);
    else if (elem.kind === 'clip_start') { ctx.save(); ctx.beginPath(); ctx.rect(elem.x, elem.y, elem.width, elem.height); ctx.clip(); }
    else if (elem.kind === 'clip_end') ctx.restore();
    // skip images for speed in optimistic repaint
  }
  ctx.restore();
}

// After re-layout, find the element matching (paraIndex, runIndex) and set cursor
function restoreCursor(paraIndex, runIndex, globalCharOff) {
  if (!layoutResult) return;
  for (let pi = 0; pi < layoutResult.pages.length; pi++) {
    const page = layoutResult.pages[pi];
    for (let ei = 0; ei < page.elements.length; ei++) {
      const el = page.elements[ei];
      if (el.kind !== 'text') continue;
      if (el.paragraph_index === paraIndex && el.run_index === runIndex) {
        const fragStart = el.char_offset || 0;
        const fragEnd = fragStart + (el.text || '').length;
        if (globalCharOff >= fragStart && globalCharOff <= fragEnd) {
          cursorPos = { pageIndex: pi, elemIndex: ei, charOffset: globalCharOff - fragStart };
          startCursorBlink();
          hiddenInput.focus();
          return;
        }
      }
    }
  }
  // Fallback: couldn't find exact match, clear cursor
  stopCursorBlink();
  cursorPos = null;
}

hiddenInput.addEventListener('keydown', e => {
  if (!cursorPos || !currentDocx) return;
  if (e.ctrlKey || e.metaKey) return;

  if (e.key === 'Backspace') {
    e.preventDefault();
    deleteChar(-1);
  } else if (e.key === 'Delete') {
    e.preventDefault();
    deleteChar(1);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    moveCursor(-1);
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    moveCursor(1);
  } else if (e.key === 'Enter') {
    e.preventDefault();
  } else if (e.key.length === 1 && !e.altKey) {
    e.preventDefault();
    insertText(e.key);
  }
});

function moveCursor(dir) {
  if (!cursorPos || !layoutResult) return;
  const page = layoutResult.pages[cursorPos.pageIndex];
  const el = page.elements[cursorPos.elemIndex];
  if (!el) return;
  const textLen = (el.text || '').length;
  const newOff = cursorPos.charOffset + dir;
  if (newOff >= 0 && newOff <= textLen) {
    cursorPos.charOffset = newOff;
  } else if (dir < 0 && newOff < 0) {
    // Move to previous text element
    for (let i = cursorPos.elemIndex - 1; i >= 0; i--) {
      if (page.elements[i].kind === 'text' && page.elements[i].text) {
        cursorPos.elemIndex = i;
        cursorPos.charOffset = (page.elements[i].text || '').length;
        break;
      }
    }
  } else if (dir > 0 && newOff > textLen) {
    // Move to next text element
    for (let i = cursorPos.elemIndex + 1; i < page.elements.length; i++) {
      if (page.elements[i].kind === 'text' && page.elements[i].text) {
        cursorPos.elemIndex = i;
        cursorPos.charOffset = 0;
        break;
      }
    }
  }
  startCursorBlink();
}

async function deleteChar(dir) {
  if (!cursorPos || !layoutResult || !currentDocx) return;
  const page = layoutResult.pages[cursorPos.pageIndex];
  const el = page.elements[cursorPos.elemIndex];
  if (!el || el.paragraph_index == null || el.run_index == null) return;

  const globalCharOffset = (el.char_offset || 0) + cursorPos.charOffset;

  try {
    const oldText = getRunText(el.paragraph_index, el.run_index);
    if (oldText == null) return;

    let newText, newCursorOffset = cursorPos.charOffset;
    if (dir < 0 && globalCharOffset > 0) {
      newText = oldText.substring(0, globalCharOffset - 1) + oldText.substring(globalCharOffset);
      newCursorOffset = Math.max(0, cursorPos.charOffset - 1);
    } else if (dir > 0 && globalCharOffset < oldText.length) {
      newText = oldText.substring(0, globalCharOffset) + oldText.substring(globalCharOffset + 1);
    } else {
      return;
    }

    editDocxNow(el.paragraph_index, el.run_index, newText);

    // Optimistic: update fragment text in place
    const fragOld = el.text || '';
    const localOff = cursorPos.charOffset;
    if (dir < 0 && localOff > 0) {
      el.text = fragOld.substring(0, localOff - 1) + fragOld.substring(localOff);
    } else if (dir > 0 && localOff < fragOld.length) {
      el.text = fragOld.substring(0, localOff) + fragOld.substring(localOff + 1);
    }
    const oldWidth = el.width;
    el.width = measureTextWidth(el);
    const dx = el.width - oldWidth;
    if (dx !== 0) shiftFollowing(page, cursorPos.elemIndex, el.y, dx);

    const newGlobalOffset = dir < 0 ? globalCharOffset - 1 : globalCharOffset;
    cursorPos.charOffset = newCursorOffset;
    pendingCursorRestore = { paraIndex: el.paragraph_index, runIndex: el.run_index, charOff: Math.max(0, newGlobalOffset) };

    repaintPage(cursorPos.pageIndex);
    drawCursor();
    scheduleRender();
  } catch (err) {
    console.error('Delete failed:', err);
  }
}

// ---- File handling ----
async function openFile(file) {
  fileName = file.name.replace(/\.docx$/, '');
  $('docName').textContent = fileName;
  $('docName').removeAttribute('data-i18n');
  const ab = await file.arrayBuffer();
  currentDocx = new Uint8Array(ab);
  await renderDocument(currentDocx);
}

$('btnOpen').addEventListener('click', () => $('openOv').classList.add('show'));
$('dCancel').addEventListener('click', () => $('openOv').classList.remove('show'));
$('dChoose').addEventListener('click', () => $('fileIn').click());
$('fileIn').addEventListener('change', async e => {
  const f = e.target.files[0];
  if (!f) return;
  $('openOv').classList.remove('show');
  await openFile(f);
  e.target.value = '';
});

$('btnNew').addEventListener('click', () => {
  currentDocx = null;
  fileName = t('newDoc');
  $('docName').textContent = fileName;
  $('docName').dataset.i18n = 'newDoc';
  canvasArea.querySelectorAll('.page-canvas,.loading-state').forEach(el => el.remove());
  emptyState.style.display = '';
  $('pgInfo').textContent = '';
  $('statusText').textContent = '';
});

// Drag and drop
canvasArea.addEventListener('dragover', e => { e.preventDefault(); e.dataTransfer.dropEffect = 'copy'; });
canvasArea.addEventListener('drop', async e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && file.name.endsWith('.docx')) {
    await openFile(file);
  }
});

// ---- Save (download current docx) ----
function dl(d, name, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([d], { type: mime }));
  a.download = name;
  a.click();
  URL.revokeObjectURL(a.href);
}

$('btnSave').addEventListener('click', () => {
  if (!currentDocx) return;
  dl(currentDocx, (fileName || 'doc') + '.docx', 'application/vnd.openxmlformats-officedocument.wordprocessingml.document');
});

$('btnPdf').addEventListener('click', () => {
  // PDF export placeholder -- docx_to_pdf not imported but can be added
  if (!currentDocx) return;
  alert('PDF export coming soon');
});

// ---- Zoom ----
let zoomLevel = 100;
const zs = $('zSlider');

function applyZoom(v) {
  v = Math.max(50, Math.min(200, v));
  zoomLevel = v;
  zs.value = v;
  $('zLvl').textContent = v + '%';
  // Re-render at new zoom if we have a document
  if (currentDocx) renderDocument(currentDocx);
}

zs.addEventListener('input', e => applyZoom(+e.target.value));
$('zOut').addEventListener('click', () => applyZoom(zoomLevel - 10));
$('zIn').addEventListener('click', () => applyZoom(zoomLevel + 10));

// ---- Ribbon tabs ----
const ribs = { home: 'ribHome', insert: 'ribInsert', layout: 'ribLayout' };
document.querySelectorAll('.rtabs button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.rtabs button').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    for (const [k, id] of Object.entries(ribs)) $(id).style.display = k === b.dataset.tab ? 'flex' : 'none';
  });
});

// ---- Color palettes (kept for future formatting) ----
const COLORS = ['#000','#444','#666','#999','#CCC','#FFF','#F00','#F60','#FC0','#FF0','#9C0','#0C0','#0CC','#06C','#00F','#63C','#C0C','#C06','#930','#630','#360','#036','#339','#808'];
function buildPal(el, cb) {
  el.innerHTML = '';
  for (const c of COLORS) {
    const b = document.createElement('button');
    b.className = 'sw';
    b.style.background = c;
    b.title = c;
    b.addEventListener('click', e => { e.stopPropagation(); cb(c); el.classList.remove('show'); });
    el.appendChild(b);
  }
}
buildPal($('colorPop'), c => { $('colorBar').style.background = c; });
buildPal($('hlPop'), c => { $('hlBar').style.background = c; });
$('btnColor').addEventListener('click', e => { e.stopPropagation(); $('colorPop').classList.toggle('show'); $('hlPop').classList.remove('show'); });
$('btnHl').addEventListener('click', e => { e.stopPropagation(); $('hlPop').classList.toggle('show'); $('colorPop').classList.remove('show'); });
document.addEventListener('click', () => { $('colorPop').classList.remove('show'); $('hlPop').classList.remove('show'); $('tgPop').classList.remove('show'); });

// ---- Table grid (kept for future editing) ----
const tg = $('tgGrid');
for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
  const b = document.createElement('button');
  b.className = 'tc';
  b.dataset.r = r;
  b.dataset.c = c;
  b.addEventListener('mouseenter', () => {
    tg.querySelectorAll('.tc').forEach(t => t.classList.toggle('hl', +t.dataset.r <= r && +t.dataset.c <= c));
    $('tgLbl').textContent = `${c + 1} x ${r + 1}`;
  });
  b.addEventListener('click', e => { e.stopPropagation(); $('tgPop').classList.remove('show'); });
  tg.appendChild(b);
}
$('btnTbl').addEventListener('click', e => { e.stopPropagation(); $('tgPop').classList.toggle('show'); });

// ---- Keyboard shortcuts ----
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 's') { e.preventDefault(); $('btnSave').click(); }
    if (e.key === 'o') { e.preventDefault(); $('btnOpen').click(); }
  }
});

// ---- i18n init ----
$('langSel').value = curLang;
$('langSel').addEventListener('change', e => {
  curLang = e.target.value;
  localStorage.setItem('oxi-lang', curLang);
  document.documentElement.lang = curLang.startsWith('zh') ? curLang : curLang.split('-')[0];
  applyI18n();
});
document.documentElement.lang = curLang.startsWith('zh') ? curLang : curLang.split('-')[0];
applyI18n();
</script>
</body>
