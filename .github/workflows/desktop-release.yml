name: Desktop Release

# Builds signed Oxi Desktop installers for Windows / macOS / Linux and
# publishes them (plus the updater manifest latest.json) as a DRAFT GitHub
# Release. Publish the draft to make it live — the app's auto-updater reads
# https://github.com/Ryujiyasu/oxi/releases/latest/download/latest.json
#
# Trigger: push a tag like desktop-v0.1.1 (after bumping the version in
# crates/oxi-desktop/tauri.conf.json and Cargo.toml).

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
            rust_targets: 'x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
            rust_targets: ''
          - platform: 'windows-latest'
            args: ''
            rust_targets: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: crates/oxi-desktop

      - name: Build and attach to a draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # The updater key was generated with an empty password on purpose
          # (the key material itself is the secret).
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          projectPath: crates/oxi-desktop
          tauriScript: tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Oxi Desktop ${{ github.ref_name }}'
          releaseBody: 'Installers for Windows / macOS / Linux. Installed apps update automatically from this release feed.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
